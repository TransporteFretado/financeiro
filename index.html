<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor B3 | Status em Tempo Real [Ações de Brener Gomes]</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --text: #f8fafc;
            --muted: #94a3b8;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }

        /* Painel de Informações de Abertura */
        .info-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
            margin-bottom: 20px; 
        }
        .info-card { 
            background: var(--card); 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid #334155;
            text-align: center;
        }
        .info-card span { display: block; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
        .info-card strong { font-size: 1.2rem; color: var(--text); }

        .header-main { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        .price-large { font-size: 2.5rem; font-weight: 800; color: var(--success); }

        /* Gráfico */
        .chart-box { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); margin-bottom: 20px; }

        /* Controles */
        .controls { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; background: #1e293b; padding: 10px; border-radius: 8px; }
        select { background: #0f172a; color: white; border: 1px solid #3b82f6; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; }

        /* Rodapé de Status do Mercado */
        .market-status {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 20px;
        }
        .status-open { background: var(--success); color: #064e3b; }
        .status-closed { background: #000000; color: #ffffff; border: 1px solid #334155; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-main">
        <div>
            <h1 id="tickerName" style="margin:0">Carregando...</h1>
            <p id="companyName" style="margin:5px 0; color:var(--muted)">Aguardando seleção</p>
        </div>
        <div class="price-large" id="mainPrice">R$ 0,00</div>
    </div>

    <div class="info-grid">
        <div class="info-card">
            <span>Última Atualização</span>
            <strong id="timeUpdate">--:--:--</strong>
        </div>
        <div class="info-card">
            <span>Abertura do Mercado</span>
            <strong id="marketOpenTime">10:00</strong>
        </div>
        <div class="info-card">
            <span>Preço de Abertura</span>
            <strong id="priceOpenDay">R$ 0,00</strong>
        </div>
    </div>

    <div class="controls">
        <span>Selecione o Ativo:</span>
        <select id="stockPicker" onchange="updateDashboard()">
            <option value="BBAS3">BBAS3 (Banco do Brasil)</option>
            <option value="ITUB4">ITUB4 (Itaú Unibanco)</option>
            <option value="TAEE11">TAEE11 (Taesa)</option>
            <option value="WEGE3">WEGE3 (WEG)</option>
            <option value="UNIP6">UNIP6 (Unipar)</option>
            <option value="KLBN11">KLBN11 (Klabin)</option>
            <option value="MXRF11">MXRF11 (Maxi Renda)</option>
            <option value="PETR4">PETR4 (Petrobras)</option>
        </select>
    </div>

    <div class="chart-box">
        <canvas id="stockChart" height="120"></canvas>
    </div>

    <div id="marketStatusLabel" class="market-status">Verificando mercado...</div>
</div>

<script>
    let myChart = null;
    const API_TOKEN = 'SEU_TOKEN_AQUI'; // <--- INSIRA SEU TOKEN DA BRAPI AQUI

    async function fetchData(ticker) {
        try {
            const response = await fetch(`https://brapi.dev/api/quote/${ticker}?range=1d&interval=15m&token=${API_TOKEN}`);
            const data = await response.json();
            const stock = data.results[0];

            // 1. Atualizar Títulos e Preços
            document.getElementById('tickerName').innerText = stock.symbol;
            document.getElementById('companyName').innerText = stock.shortName;
            document.getElementById('mainPrice').innerText = `R$ ${stock.regularMarketPrice.toFixed(2)}`;
            document.getElementById('priceOpenDay').innerText = `R$ ${stock.regularMarketOpen.toFixed(2)}`;
            document.getElementById('timeUpdate').innerText = new Date().toLocaleTimeString();

            // 2. Preparar Gráfico
            const history = stock.historicalDataPrice;
            const labels = history.map(h => new Date(h.date * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
            const prices = history.map(h => h.close);

            renderChart(labels, prices, stock.symbol);
            checkMarketStatus();

        } catch (error) {
            console.error("Erro ao carregar dados:", error);
            document.getElementById('tickerName').innerText = "Erro na API";
        }
    }

    function renderChart(labels, data, ticker) {
        const ctx = document.getElementById('stockChart').getContext('2d');
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: ticker,
                    data: data,
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 2
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { color: '#94a3b8' }, grid: { display: false } },
                    y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
                }
            }
        });
    }

    function checkMarketStatus() {
        const now = new Date();
        const day = now.getDay(); // 0 = Domingo, 6 = Sábado
        const hour = now.getHours();
        const min = now.getMinutes();
        const currentTime = hour * 60 + min;

        const openTime = 10 * 60; // 10:00
        const closeTime = 17 * 60 + 55; // 17:55
        
        const label = document.getElementById('marketStatusLabel');
        const isWeekend = (day === 0 || day === 6);

        if (!isWeekend && currentTime >= openTime && currentTime <= closeTime) {
            label.innerText = "● Mercado Aberto";
            label.className = "market-status status-open";
        } else {
            label.innerText = "● Mercado Fechado (Fechamento às 17:55)";
            label.className = "market-status status-closed";
        }
    }

    function updateDashboard() {
        const ticker = document.getElementById('stockPicker').value;
        fetchData(ticker);
    }

    // Inicialização
    updateDashboard();
    // Atualiza a cada 5 minutos automaticamente
    setInterval(updateDashboard, 300000);
</script>

</body>
</html>
