<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor B3 | GTB Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Variáveis de Tema - Mudarão via JS */
        :root {
            --bg: #0b0f1a;
            --card-bg: #161b2b;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --border: #2d3748;
            --accent: #3b82f6;
        }

        /* Tema Claro (Nascer do Sol) */
        .light-theme {
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #d1d5db;
            --accent: #2563eb;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 10px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.5s ease, color 0.5s ease;
        }

        .header { text-align: center; margin-bottom: 20px; width: 100%; }
        .header h1 { font-size: 1.8rem; font-weight: 800; margin: 0; color: var(--accent); }
        .header p { font-size: 0.75rem; color: var(--text-muted); margin-top: 5px; line-height: 1.4; }

        .global-controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-toggle {
            background: var(--border);
            color: var(--text-main);
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }

        .sector-section {
            width: 100%;
            max-width: 800px;
            margin-bottom: 10px;
            border-radius: 12px;
            overflow: hidden;
            background: var(--card-bg);
            border: 1px solid var(--border);
        }

        .sector-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background: rgba(128, 128, 128, 0.1);
        }

        .sector-title { font-size: 0.85rem; font-weight: 800; color: var(--accent); text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; padding: 15px; }
        .collapsed .grid { display: none; }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
        .ticker-highlight { font-size: 1.1rem; font-weight: 800; color: var(--accent); display: block; }
        .company-sub { font-size: 0.65rem; color: var(--text-muted); display: block; margin-bottom: 8px; }
        .price-main { font-size: 1.6rem; font-weight: 800; margin: 2px 0; display: block; }

        /* Estilo da Variação Solicitado */
        .variation-sub { font-size: 0.75rem; font-weight: 600; margin-bottom: 5px; }

        .details { margin-top: 8px; font-size: 0.6rem; color: var(--text-muted); border-top: 1px solid var(--border); padding-top: 6px; }

        .up { color: var(--success); }
        .down { color: var(--danger); }

        /* Rodapé de Status */
        .footer-status {
            position: fixed;
            bottom: 10px;
            padding: 10px 20px;
            background: var(--card-bg);
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-green { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .dot-red { background: var(--danger); }

        @media (max-width: 400px) { .grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <h1>GTB Solution</h1>
    <p>Carteira de Investimento de Gabriel Naor, Thiago Viegas, Brener Gomes</p>
</div>

<div class="global-controls">
    <button class="btn-toggle" onclick="toggleAll(false)">Expandir Todos</button>
    <button class="btn-toggle" onclick="toggleAll(true)">Recolher Todos</button>
</div>

<div id="dashboard-content" style="width: 100%; max-width: 800px; padding-bottom: 60px;"></div>

<div class="footer-status" id="marketStatus">
    </div>

<script>
    const API_TOKEN = 'nctccHqqPkRvTdxGsZeK2f';
    
    const sectors = {
        "Bancos & Seguros": {
            "BBAS3": "Banco do Brasil", "BBDC4": "Bradesco", "BBSE3": "BB Seguridade",
            "CXSE3": "Caixa Seguridade", "ITUB4": "Itaú Unibanco"
        },
        "Energia": { "EQTL3": "Equatorial Energia", "TAEE11": "Taesa" },
        "Papel & Indústria": { 
            "KLBN3": "Klabin Ord.", "KLBN11": "Klabin Unit", 
            "UNIP6": "Unipar", "WEGE3": "WEG S.A." 
        },
        "Fundos Imobiliários": { "BTHF11": "BTG Logística", "MXRF11": "Maxi Renda" }
    };

    // Função de Tema Automático
    function applyAutoTheme() {
        const hour = new Date().getHours();
        const isDaytime = hour >= 6 && hour < 18;
        if (isDaytime) {
            document.body.classList.add('light-theme');
        } else {
            document.body.classList.remove('light-theme');
        }
    }

    function createStructure() {
        const content = document.getElementById('dashboard-content');
        content.innerHTML = '';
        
        for (const [sectorName, stocks] of Object.entries(sectors)) {
            const count = Object.keys(stocks).length;
            const sectionId = sectorName.replace(/\s+/g, '');
            const section = document.createElement('div');
            section.className = 'sector-section';
            section.id = `sec-${sectionId}`;
            section.innerHTML = `
                <div class="sector-header" onclick="toggleSector('${sectionId}')">
                    <span class="sector-title">${sectorName} (${count})</span>
                    <span class="icon-arrow">▼</span>
                </div>
                <div class="grid" id="grid-${sectionId}"></div>
            `;
            content.appendChild(section);
        }
    }

    function updateMarketStatus() {
        const now = new Date();
        const hour = now.getHours();
        const minute = now.getMinutes();
        const currentTime = now.toLocaleTimeString();
        
        // Horário B3: 10:00 às 18:00 (Aproximado com pré-abertura)
        const isOpen = (hour > 10 || (hour === 10 && minute >= 0)) && (hour < 18);
        const statusEl = document.getElementById('marketStatus');

        if (isOpen) {
            statusEl.innerHTML = `
                <div class="status-dot dot-green"></div>
                <span>Mercado Aberto | Última Atualização: ${currentTime}</span>
            `;
        } else {
            statusEl.innerHTML = `
                <div class="status-dot dot-red"></div>
                <span>Mercado Fechado | Hora Local: ${currentTime}</span>
            `;
        }
    }

    async function loadStocks() {
        for (const [sectorName, stocks] of Object.entries(sectors)) {
            const gridId = `grid-${sectorName.replace(/\s+/g, '')}`;
            const grid = document.getElementById(gridId);

            for (const ticker in stocks) {
                try {
                    const response = await fetch(`https://brapi.dev/api/quote/${ticker}?token=${API_TOKEN}`);
                    const data = await response.json();
                    if (data.results && data.results[0]) {
                        updateCard(data.results[0], stocks[ticker], grid);
                    }
                } catch (e) { console.error(ticker, e); }
            }
        }
        updateMarketStatus();
    }

    function updateCard(stock, fullName, grid) {
        let card = document.getElementById(`card-${stock.symbol}`);
        const isUp = stock.regularMarketChangePercent >= 0;
        const colorClass = isUp ? 'up' : 'down';
        const sign = isUp ? '+' : '';

        // Formatação solicitada: +1% | R$ 2,00
        const variationText = `${sign}${stock.regularMarketChangePercent.toFixed(2)}% | R$ ${Math.abs(stock.regularMarketChange).toFixed(2)}`;

        const cardHTML = `
            <span class="ticker-highlight">${stock.symbol}</span>
            <span class="company-sub">${fullName}</span>
            <span class="price-main ${colorClass}">R$ ${stock.regularMarketPrice.toFixed(2)}</span>
            <div class="variation-sub ${colorClass}">${variationText}</div>
            <div class="details">Abert: R$ ${stock.regularMarketOpen.toFixed(2)}</div>
        `;

        if (card) {
            card.innerHTML = cardHTML;
        } else {
            const newCard = document.createElement('div');
            newCard.id = `card-${stock.symbol}`;
            newCard.className = 'card';
            newCard.innerHTML = cardHTML;
            grid.appendChild(newCard);
        }
    }

    function toggleSector(id) { document.getElementById(`sec-${id}`).classList.toggle('collapsed'); }
    function toggleAll(hide) {
        document.querySelectorAll('.sector-section').forEach(s => {
            hide ? s.classList.add('collapsed') : s.classList.remove('collapsed');
        });
    }

    // Init
    applyAutoTheme();
    createStructure();
    loadStocks();
    setInterval(loadStocks, 60000); // Atualiza dados
    setInterval(updateMarketStatus, 1000); // Atualiza relógio do status
</script>
</body>
</html>
