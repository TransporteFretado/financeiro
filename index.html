<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor B3 | GTB Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: #161b2b;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --border: #2d3748;
            --accent: #3b82f6;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 15px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 30px; width: 100%; }
        .header h1 { font-size: 2.2rem; font-weight: 800; margin: 0; color: var(--accent); }

        /* Estilo dos Grupos/Setores */
        .sector-section {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 40px;
        }

        .sector-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent);
            padding-left: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        /* Hierarquia: TOKEN (Grande) e Nome (Pequeno) */
        .ticker-highlight { 
            font-size: 1.8rem; 
            font-weight: 800; 
            color: var(--accent); 
            display: block;
            line-height: 1.1;
        }
        
        .company-sub { 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            display: block;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        .price-main {
            font-size: 2.8rem;
            font-weight: 800;
            margin: 5px 0;
            display: block;
        }

        .variation-sub {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .details {
            border-top: 1px solid var(--border);
            padding-top: 15px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .up { color: var(--success); }
        .down { color: var(--danger); }

        .footer-status {
            position: fixed;
            bottom: 15px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 30px;
            font-size: 0.75rem;
            border: 1px solid var(--border);
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>GTB Solution</h1>
</div>

<div id="dashboard-content" style="width: 100%; max-width: 1200px;">
    </div>

<div class="footer-status" id="marketStatus">SINCRONIZANDO COM B3...</div>

<script>
    const API_TOKEN = 'nctccHqqPkRvTdxGsZeK2f';
    
    // Organização por Grupos
    const sectors = {
        "Bancos & Seguros": {
            "BBAS3": "Banco do Brasil",
            "BBDC4": "Bradesco",
            "BBSE3": "BB Seguridade",
            "CXSE3": "Caixa Seguridade",
            "ITUB4": "Itaú Unibanco"
        },
        "Energia": {
            "EQTL3": "Equatorial Energia",
            "TAEE11": "Taesa"
        },
        "Papel, Celulose & Indústria": {
            "KLBN3": "Klabin S.A. (Ordinária)",
            "KLBN11": "Klabin S.A. (Unit)",
            "UNIP6": "Unipar",
            "WEGE3": "WEG S.A."
        },
        "Fundos Imobiliários": {
            "BTHF11": "BTG Logística",
            "MXRF11": "Maxi Renda"
        }
    };

    function createStructure() {
        const content = document.getElementById('dashboard-content');
        content.innerHTML = '';
        
        for (const [sectorName, stocks] of Object.entries(sectors)) {
            const section = document.createElement('div');
            section.className = 'sector-section';
            section.innerHTML = `
                <div class="sector-title">${sectorName}</div>
                <div class="grid" id="grid-${sectorName.replace(/\s+/g, '')}"></div>
            `;
            content.appendChild(section);
        }
    }

    async function loadStocks() {
        for (const [sectorName, stocks] of Object.entries(sectors)) {
            const gridId = `grid-${sectorName.replace(/\s+/g, '')}`;
            const grid = document.getElementById(gridId);

            for (const ticker in stocks) {
                try {
                    const response = await fetch(`https://brapi.dev/api/quote/${ticker}?token=${API_TOKEN}`);
                    const data = await response.json();
                    if (data.results && data.results[0]) {
                        updateOrCreateCard(data.results[0], stocks[ticker], grid);
                    }
                } catch (e) { console.error("Erro no ticker " + ticker, e); }
            }
        }
        document.getElementById('marketStatus').innerText = "ÚLTIMA ATUALIZAÇÃO: " + new Date().toLocaleTimeString();
    }

    function updateOrCreateCard(stock, fullName, grid) {
        let card = document.getElementById(`card-${stock.symbol}`);
        
        const isUp = stock.regularMarketChangePercent >= 0;
        const colorClass = isUp ? 'up' : 'down';
        const sign = isUp ? '+' : '';

        const cardHTML = `
            <span class="ticker-highlight">${stock.symbol}</span>
            <span class="company-sub">${fullName}</span>
            <span class="price-main ${colorClass}">R$ ${stock.regularMarketPrice.toFixed(2)}</span>
            <div class="variation-sub ${colorClass}">
                ${sign}${stock.regularMarketChangePercent.toFixed(2)}% (R$ ${stock.regularMarketChange.toFixed(2)})
            </div>
            <div class="details">
                Abertura: <strong style="color:white;">R$ ${stock.regularMarketOpen.toFixed(2)}</strong>
            </div>
        `;

        if (card) {
            card.innerHTML = cardHTML;
        } else {
            const newCard = document.createElement('div');
            newCard.id = `card-${stock.symbol}`;
            newCard.className = 'card';
            newCard.innerHTML = cardHTML;
            grid.appendChild(newCard);
        }
    }

    // Inicialização
    createStructure();
    loadStocks();
    setInterval(loadStocks, 60000);
</script>
</body>
</html>
