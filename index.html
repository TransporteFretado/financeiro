<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor B3 | GTB Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: #161b2b;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --border: #2d3748;
            --accent: #3b82f6;
        }

        .light-theme {
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #d1d5db;
            --accent: #2563eb;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.5s ease;
        }

        /* --- ESTILO DOS TICKERS --- */
        .ticker-container { width: 100%; overflow: hidden; background: #000; border-bottom: 1px solid var(--border); height: 35px; display: flex; align-items: center; position: relative; }
        .ticker-label { position: absolute; left: 0; background: var(--accent); color: white; padding: 0 10px; font-size: 0.65rem; font-weight: 800; height: 100%; display: flex; align-items: center; z-index: 10; text-transform: uppercase; }
        .ticker-label.baixas { background: var(--danger); }

        .ticker-move { display: flex; white-space: nowrap; animation: ticker 40s linear infinite; padding-left: 100px; }
        .ticker-item { padding: 0 25px; font-size: 0.8rem; font-weight: 700; color: #fff; }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* --- LAYOUT --- */
        .header { text-align: center; padding: 20px 10px; width: 100%; }
        .header h1 { font-size: 1.8rem; font-weight: 800; margin: 0; color: var(--accent); }
        .header p { font-size: 0.75rem; color: var(--text-muted); margin-top: 5px; }

        .global-controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-toggle { background: var(--border); color: var(--text-main); border: none; padding: 8px 15px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; cursor: pointer; }

        .sector-section { width: 95%; max-width: 800px; margin-bottom: 10px; border-radius: 12px; overflow: hidden; background: var(--card-bg); border: 1px solid var(--border); }
        .sector-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: rgba(128, 128, 128, 0.1); }
        .sector-title { font-size: 0.85rem; font-weight: 800; color: var(--accent); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; padding: 15px; }
        .collapsed .grid { display: none; }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
        .price-main { font-size: 1.6rem; font-weight: 800; margin: 2px 0; display: block; }
        .up { color: var(--success); }
        .down { color: var(--danger); }

        .footer-status { position: fixed; bottom: 10px; padding: 10px 20px; background: var(--card-bg); border-radius: 30px; font-size: 0.7rem; font-weight: bold; border: 1px solid var(--border); display: flex; align-items: center; gap: 10px; z-index: 1000; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-green { background: var(--success); box-shadow: 0 0 8px var(--success); }
    </style>
</head>
<body>

<div class="ticker-container">
    <div class="ticker-label">Carteira</div>
    <div class="ticker-move" id="tickerCarteira"></div>
</div>

<div class="ticker-container" style="background: #1a0000;">
    <div class="ticker-label baixas">Top Baixas</div>
    <div class="ticker-move" id="tickerBaixas"></div>
</div>

<div class="header">
    <h1>GTB Solution</h1>
    <p>Carteira de Investimento de Gabriel Naor, Thiago Viegas, Brener Gomes</p>
</div>

<div class="global-controls">
    <button class="btn-toggle" onclick="toggleAll(false)">Expandir Todos</button>
    <button class="btn-toggle" onclick="toggleAll(true)">Recolher Todos</button>
</div>

<div id="dashboard-content" style="width: 100%; max-width: 800px; padding-bottom: 70px;"></div>

<div class="footer-status" id="marketStatus"></div>

<script>
    const API_TOKEN = 'nctccHqqPkRvTdxGsZeK2f';
    
    const sectors = {
        "Bancos & Seguros": { "BBAS3": "Banco do Brasil", "BBDC4": "Bradesco", "BBSE3": "BB Seguridade", "CXSE3": "Caixa Seguridade", "ITUB4": "Itaú Unibanco" },
        "Energia": { "EQTL3": "Equatorial Energia", "TAEE11": "Taesa" },
        "Papel & Indústria": { "KLBN3": "Klabin Ord.", "KLBN11": "Klabin Unit", "UNIP6": "Unipar", "WEGE3": "WEG S.A." },
        "Fundos Imobiliários": { "BTHF11": "BTG Logística", "MXRF11": "Maxi Renda" }
    };

    function applyAutoTheme() {
        const hour = new Date().getHours();
        if (hour >= 6 && hour < 18) document.body.classList.add('light-theme');
    }

    function createStructure() {
        const content = document.getElementById('dashboard-content');
        content.innerHTML = '';
        for (const [sectorName, stocks] of Object.entries(sectors)) {
            const sectionId = sectorName.replace(/\s+/g, '');
            const section = document.createElement('div');
            section.className = 'sector-section';
            section.id = `sec-${sectionId}`;
            section.innerHTML = `
                <div class="sector-header" onclick="toggleSector('${sectionId}')">
                    <span class="sector-title">${sectorName}</span>
                    <span>▼</span>
                </div>
                <div class="grid" id="grid-${sectionId}"></div>
            `;
            content.appendChild(section);
        }
    }

    // Carregamento individual para evitar Erro 400
    async function loadStocks() {
        let tickerHTML = '';
        const allBaixas = [];

        for (const [sectorName, stocks] of Object.entries(sectors)) {
            const grid = document.getElementById(`grid-${sectorName.replace(/\s+/g, '')}`);
            
            for (const ticker in stocks) {
                try {
                    const response = await fetch(`https://brapi.dev/api/quote/${ticker}?token=${API_TOKEN}`);
                    const data = await response.json();
                    
                    if (data.results && data.results[0]) {
                        const stock = data.results[0];
                        updateCard(stock, stocks[ticker], grid);
                        
                        // Adiciona ao HTML do Scroll de Carteira
                        const color = stock.regularMarketChangePercent >= 0 ? '#10b981' : '#ef4444';
                        tickerHTML += `<div class="ticker-item">${stock.symbol} R$ ${stock.regularMarketPrice.toFixed(2)} <span style="color:${color}">${stock.regularMarketChangePercent.toFixed(2)}%</span></div>`;
                    
                        // Salva para processar as baixas depois
                        if (stock.regularMarketChangePercent < 0) {
                            allBaixas.push(stock);
                        }
                    }
                } catch (e) { console.error("Erro no ticker " + ticker, e); }
            }
        }
        
        document.getElementById('tickerCarteira').innerHTML = tickerHTML + tickerHTML;
        updateBaixasScroll(allBaixas);
        updateMarketStatus();
    }

    function updateBaixasScroll(baixas) {
        // Ordena pelas piores quedas
        baixas.sort((a, b) => a.regularMarketChangePercent - b.regularMarketChangePercent);
        let baixasHTML = '';
        baixas.forEach(stock => {
            baixasHTML += `<div class="ticker-item">${stock.symbol} <span style="color:#ef4444">${stock.regularMarketChangePercent.toFixed(2)}%</span></div>`;
        });
        document.getElementById('tickerBaixas').innerHTML = baixasHTML + baixasHTML;
    }

    function updateCard(stock, fullName, grid) {
        let card = document.getElementById(`card-${stock.symbol}`);
        const isUp = stock.regularMarketChangePercent >= 0;
        const colorClass = isUp ? 'up' : 'down';
        
        const cardHTML = `
            <span style="font-weight:800; color:var(--accent); display:block;">${stock.symbol}</span>
            <small style="color:var(--text-muted); font-size:0.6rem;">${fullName}</small>
            <span class="price-main ${colorClass}">R$ ${stock.regularMarketPrice.toFixed(2)}</span>
            <div style="font-size:0.7rem; font-weight:600;" class="${colorClass}">
                ${isUp?'+':''}${stock.regularMarketChangePercent.toFixed(2)}% | R$ ${Math.abs(stock.regularMarketChange).toFixed(2)}
            </div>
        `;

        if (card) card.innerHTML = cardHTML;
        else {
            const newCard = document.createElement('div');
            newCard.id = `card-${stock.symbol}`;
            newCard.className = 'card';
            newCard.innerHTML = cardHTML;
            grid.appendChild(newCard);
        }
    }

    function updateMarketStatus() {
        const now = new Date();
        const isOpen = now.getHours() >= 10 && now.getHours() < 18;
        document.getElementById('marketStatus').innerHTML = `<div class="status-dot ${isOpen?'dot-green':'dot-red'}"></div> Mercado ${isOpen?'Aberto':'Fechado'} | ${now.toLocaleTimeString()}`;
    }

    function toggleSector(id) { document.getElementById(`sec-${id}`).classList.toggle('collapsed'); }
    function toggleAll(hide) { document.querySelectorAll('.sector-section').forEach(s => hide ? s.classList.add('collapsed') : s.classList.remove('collapsed')); }

    applyAutoTheme();
    createStructure();
    loadStocks();
    setInterval(loadStocks, 60000); // Voltou para 1 minuto para não sobrecarregar
</script>
</body>
</html>
