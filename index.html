<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor B3 | GTB Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Paleta B3 - Cores Vivas */
            --bg: #05070a;
            --card-bg: #0f1420;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --b3-blue: #003399; /* Azul Royal B3 */
            --b3-accent: #0055ff; /* Azul vibrante para Tickers */
            --success: #00ff88; /* Verde Neon Saturado */
            --danger: #ff3355; /* Vermelho Vivo Saturado */
            --border: #1e293b;
        }

        .light-theme {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #001e62;
            --text-muted: #64748b;
            --border: #cbd5e1;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Sora', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px 10px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- CABEÇALHO --- */
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.6rem; font-weight: 800; color: var(--b3-accent); text-transform: uppercase; margin: 0; }
        .header p { font-size: 0.85rem; color: var(--text-muted); margin-top: 5px; }

        .global-controls { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn-toggle {
            background: var(--b3-blue); color: white; border: none;
            padding: 10px 20px; border-radius: 5px; font-size: 0.7rem; font-weight: 700; cursor: pointer;
            text-transform: uppercase; transition: transform 0.2s;
        }
        .btn-toggle:active { transform: scale(0.95); }

        /* --- SEÇÕES --- */
        .sector-section {
            width: 100%; max-width: 900px; margin-bottom: 15px;
            border-radius: 8px; overflow: hidden; background: var(--card-bg); border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .sector-header {
            padding: 18px 24px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; border-bottom: 1px solid var(--border);
        }

        .sector-title { font-size: 0.75rem; font-weight: 800; color: var(--b3-accent); letter-spacing: 0.1em; text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1px; background: var(--border); }
        .collapsed .grid { display: none; }

        /* --- CARDS VIVOS --- */
        .card { background: var(--card-bg); padding: 30px 15px; text-align: center; }
        .ticker-name { font-size: 1.1rem; font-weight: 800; color: var(--b3-accent); display: block; margin-bottom: 2px; }
        .company-name { font-size: 0.6rem; color: var(--text-muted); margin-bottom: 15px; text-transform: uppercase; font-weight: 600; }
        .price-main { font-size: 1.8rem; font-weight: 700; margin-bottom: 5px; }
        
        /* Variação com cores saturadas */
        .variation-box { font-size: 0.85rem; font-weight: 800; margin-bottom: 25px; }
        .up { color: var(--success); text-shadow: 0 0 10px rgba(0, 255, 136, 0.3); }
        .down { color: var(--danger); text-shadow: 0 0 10px rgba(255, 51, 85, 0.3); }

        /* Abertura */
        .opening-container { border-top: 1px solid var(--border); padding-top: 15px; }
        .opening-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; display: block; }
        .opening-price { font-size: 1rem; font-weight: 700; color: var(--text-main); }

        /* --- STATUS RODAPÉ --- */
        .footer-status {
            position: fixed; bottom: 20px; padding: 12px 25px; background: #000;
            border-radius: 50px; font-size: 0.7rem; font-weight: 700; border: 1px solid var(--b3-blue);
            display: flex; align-items: center; gap: 12px; box-shadow: 0 0 20px rgba(0, 85, 255, 0.2);
        }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-green { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .dot-red { background: var(--danger); box-shadow: 0 0 10px var(--danger); }
        
        @media (max-width: 480px) { .grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <h1>GTB Solution</h1>
    <p>Carteira de Investimento</p>
</div>

<div class="global-controls">
    <button class="btn-toggle" onclick="toggleAll(false)">Expandir Tudo</button>
    <button class="btn-toggle" onclick="toggleAll(true)">Recolher Tudo</button>
</div>

<div id="dashboard-content" style="width: 100%; max-width: 900px; padding-bottom: 100px;"></div>

<div class="footer-status" id="marketStatus"></div>

<script>
    const API_TOKEN = 'nctccHqqPkRvTdxGsZeK2f';
    
    const sectors = {
        "Bancos & Seguros": { "BBAS3": "Banco do Brasil", "BBDC4": "Bradesco", "BBSE3": "BB Seguridade", "CXSE3": "Caixa Seguridade", "ITUB4": "Itaú Unibanco" },
        "Energia": { "EQTL3": "Equatorial Energia", "TAEE11": "Taesa" },
        "Papel & Indústria": { "KLBN3": "Klabin Ord.", "KLBN11": "Klabin Unit", "UNIP6": "Unipar", "WEGE3": "WEG S.A." },
        "Fundos Imobiliários": { "BTHF11": "BTG Logística", "MXRF11": "Maxi Renda" }
    };

    function createStructure() {
        const content = document.getElementById('dashboard-content');
        content.innerHTML = '';
        for (const [sectorName, stocks] of Object.entries(sectors)) {
            const sectionId = sectorName.replace(/\s+/g, '');
            const section = document.createElement('div');
            section.className = 'sector-section';
            section.id = `sec-${sectionId}`;
            section.innerHTML = `
                <div class="sector-header" onclick="toggleSector('${sectionId}')">
                    <span class="sector-title">${sectorName}</span>
                    <span style="color:var(--b3-accent)">▼</span>
                </div>
                <div class="grid" id="grid-${sectionId}"></div>
            `;
            content.appendChild(section);
        }
    }

    async function loadStocks() {
        for (const [sectorName, stocks] of Object.entries(sectors)) {
            const gridId = `grid-${sectorName.replace(/\s+/g, '')}`;
            const grid = document.getElementById(gridId);
            for (const ticker in stocks) {
                try {
                    const response = await fetch(`https://brapi.dev/api/quote/${ticker}?token=${API_TOKEN}`);
                    const data = await response.json();
                    if (data.results && data.results[0]) {
                        updateCard(data.results[0], stocks[ticker], grid);
                    }
                } catch (e) { console.error(ticker, e); }
            }
        }
        updateMarketStatus();
    }

    function updateCard(stock, fullName, grid) {
        let card = document.getElementById(`card-${stock.symbol}`);
        const isUp = stock.regularMarketChangePercent >= 0;
        const colorClass = isUp ? 'up' : 'down';
        const sign = isUp ? '+' : '';
        const openingPrice = stock.regularMarketOpen || stock.regularMarketPreviousClose || 0;

        const cardHTML = `
            <span class="ticker-name">${stock.symbol}</span>
            <span class="company-name">${fullName}</span>
            <span class="price-main">R$ ${stock.regularMarketPrice.toFixed(2)}</span>
            <div class="variation-box ${colorClass}">
                ${sign}${stock.regularMarketChangePercent.toFixed(2)}% | R$ ${Math.abs(stock.regularMarketChange).toFixed(2)}
            </div>
            <div class="opening-container">
                <span class="opening-label">Abertura</span>
                <span class="opening-price">R$ ${openingPrice.toFixed(2)}</span>
            </div>
        `;

        if (card) {
            card.innerHTML = cardHTML;
        } else {
            const newCard = document.createElement('div');
            newCard.id = `card-${stock.symbol}`;
            newCard.className = 'card';
            newCard.innerHTML = cardHTML;
            grid.appendChild(newCard);
        }
    }

    function updateMarketStatus() {
        const now = new Date();
        const isOpen = now.getHours() >= 10 && now.getHours() < 18;
        const statusEl = document.getElementById('marketStatus');
        statusEl.innerHTML = `
            <div class="status-dot ${isOpen?'dot-green':'dot-red'}"></div>
            <span style="text-transform: uppercase;">MERCADO ${isOpen?'ABERTO':'FECHADO'} | ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
        `;
    }

    function toggleSector(id) { document.getElementById(`sec-${id}`).classList.toggle('collapsed'); }
    function toggleAll(hide) {
        document.querySelectorAll('.sector-section').forEach(s => {
            hide ? s.classList.add('collapsed') : s.classList.remove('collapsed');
        });
    }

    createStructure();
    loadStocks();
    setInterval(loadStocks, 60000);
</script>
</body>
</html>
