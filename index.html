<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Financeiro B3 | GTB Solution </title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --text: #f8fafc;
            --muted: #94a3b8;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }

        /* Header e Preço Principal */
        .header-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        /* Caixa de Valor Atual */
        .value-box { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid #334155;
            text-align: right;
            min-width: 200px;
        }
        .price-large { font-size: 2.8rem; font-weight: 800; line-height: 1; }
        .variation-badge { 
            display: inline-block; 
            margin-top: 8px; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-weight: bold; 
            font-size: 1.1rem; 
        }

        /* Quadros Informativos */
        .info-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; 
            margin-bottom: 20px; 
        }
        .info-card { 
            background: var(--card); 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid #334155;
            text-align: center;
        }
        .info-card span { display: block; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
        .info-card strong { font-size: 1.2rem; }

        /* Gráfico e Controles */
        .chart-box { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #334155; margin-bottom: 20px; }
        .controls { margin-bottom: 20px; }
        select { 
            width: 100%; 
            background: #1e293b; 
            color: white; 
            border: 2px solid #3b82f6; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 1rem; 
            cursor: pointer; 
        }

        /* Rodapé Status */
        .market-status {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            font-weight: 800;
            text-transform: uppercase;
            margin-top: 20px;
        }
        .status-open { background: var(--success); color: #064e3b; }
        .status-closed { background: #000000; color: #ffffff; border: 1px solid #334155; }
        
        .up { color: var(--success); }
        .down { color: var(--danger); }
        .bg-up { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .bg-down { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-main">
        <div>
            <h1 id="tickerName" style="margin:0; font-size: 2.5rem;">Aguardando...</h1>
            <p id="companyName" style="margin:5px 0; color:var(--muted); font-size: 1.1rem;">Selecione uma ação abaixo</p>
        </div>
        <div class="value-box">
            <div id="mainPrice" class="price-large">R$ 0,00</div>
            <div id="variation" class="variation-badge">0.00%</div>
        </div>
    </div>

    <div class="controls">
        <select id="stockPicker" onchange="updateDashboard()">
            <option value="BBAS3">BBAS3 - Banco do Brasil</option>
            <option value="ITUB4">ITUB4 - Itaú Unibanco</option>
            <option value="TAEE11">TAEE11 - Taesa</option>
            <option value="WEGE3">WEGE3 - WEG</option>
            <option value="UNIP6">UNIP6 - Unipar</option>
            <option value="KLBN11">KLBN11 - Klabin</option>
            <option value="MXRF11">MXRF11 - Maxi Renda</option>
        </select>
    </div>

    <div class="info-grid">
        <div class="info-card">
            <span>Última Atualização</span>
            <strong id="timeUpdate">--:--:--</strong>
        </div>
        <div class="info-card">
            <span>Abertura do Mercado</span>
            <strong>10:00</strong>
        </div>
        <div class="info-card">
            <span>Preço de Abertura</span>
            <strong id="priceOpenDay">R$ 0,00</strong>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="stockChart" height="100"></canvas>
    </div>

    <div id="marketStatusLabel" class="market-status">Verificando...</div>
</div>

<script>
    let myChart = null;
    // TOKEN INSERIDO CONFORME SOLICITADO
    const API_TOKEN = 'nctccHqqPkRvTdxGsZeK2f'; 

    async function fetchData(ticker) {
        try {
            // Chamada para a API Brapi
            const response = await fetch(`https://brapi.dev/api/quote/${ticker}?range=1d&interval=15m&token=${API_TOKEN}`);
            const data = await response.json();
            
            if (!data.results || data.results.length === 0) throw new Error("Ação não encontrada");
            
            const stock = data.results[0];

            // 1. Atualizar Títulos e Preços
            document.getElementById('tickerName').innerText = stock.symbol;
            document.getElementById('companyName').innerText = stock.shortName;
            
            const precoAtual = stock.regularMarketPrice;
            const variacao = stock.regularMarketChangePercent;
            
            document.getElementById('mainPrice').innerText = `R$ ${precoAtual.toFixed(2)}`;
            document.getElementById('priceOpenDay').innerText = `R$ ${stock.regularMarketOpen.toFixed(2)}`;
            document.getElementById('timeUpdate').innerText = new Date().toLocaleTimeString();

            // 2. Atualizar Caixa de Variação
            const varBadge = document.getElementById('variation');
            varBadge.innerText = (variacao >= 0 ? '+' : '') + variacao.toFixed(2) + '%';
            varBadge.className = 'variation-badge ' + (variacao >= 0 ? 'bg-up' : 'bg-down');
            document.getElementById('mainPrice').className = 'price-large ' + (variacao >= 0 ? 'up' : 'down');

            // 3. Preparar Gráfico
            if (stock.historicalDataPrice) {
                const history = stock.historicalDataPrice;
                const labels = history.map(h => new Date(h.date * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
                const prices = history.map(h => h.close);
                renderChart(labels, prices, stock.symbol, variacao >= 0 ? '#10b981' : '#ef4444');
            }

            checkMarketStatus();

        } catch (error) {
            console.error("Erro:", error);
            document.getElementById('tickerName').innerText = "Erro na API";
            document.getElementById('companyName').innerText = "Verifique o Token ou Plano";
        }
    }

    function renderChart(labels, data, ticker, color) {
        const ctx = document.getElementById('stockChart').getContext('2d');
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: ticker,
                    data: data,
                    borderColor: color,
                    backgroundColor: color + '1A', // Adiciona transparência
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0,
                    pointHoverRadius: 5
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { color: '#94a3b8', maxRotation: 0 }, grid: { display: false } },
                    y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
                }
            }
        });
    }

    function checkMarketStatus() {
        const now = new Date();
        const day = now.getDay(); 
        const hour = now.getHours();
        const min = now.getMinutes();
        const currentTime = hour * 60 + min;

        const openTime = 10 * 60; // 10:00
        const closeTime = 17 * 60 + 55; // 17:55
        
        const label = document.getElementById('marketStatusLabel');
        const isWeekend = (day === 0 || day === 6);

        if (!isWeekend && currentTime >= openTime && currentTime <= closeTime) {
            label.innerText = "● Mercado Aberto";
            label.className = "market-status status-open";
        } else {
            const closingInfo = isWeekend ? "Fim de Semana" : "Fechado às 17:55";
            label.innerText = `● Mercado Fechado (${closingInfo})`;
            label.className = "market-status status-closed";
        }
    }

    function updateDashboard() {
        const ticker = document.getElementById('stockPicker').value;
        fetchData(ticker);
    }

    // Inicialização
    updateDashboard();
    // Atualiza a cada 2 minutos
    setInterval(updateDashboard, 120000);
</script>

</body>
</html>
