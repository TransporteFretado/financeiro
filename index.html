<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTB Terminal | Estratégico</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e11; --card-bg: #161a1e; --text-main: #e3e6e8;
            --text-muted: #707a8a; --border: #2b3139; --success: #00f2a1; --danger: #ff4d6d; --warning: #ffb800;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text-main); overflow-x: hidden; }

        .container { display: flex; flex-direction: column; align-items: center; padding: 20px 10px; }
        .header h1 { font-size: 1.6rem; font-weight: 900; text-align: center; }
        .header p { font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; font-weight: 600; text-align: center; }

        .btn-container { display: flex; gap: 8px; margin: 20px 0; }
        .btn {
            background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border);
            padding: 8px 15px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; cursor: pointer;
        }

        .sector-section { width: 100%; max-width: 1100px; margin-bottom: 15px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
        .sector-header { padding: 15px 20px; display: flex; justify-content: space-between; cursor: pointer; align-items: center; background: rgba(0,0,0,0.2); }
        .sector-title { font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 12px; padding: 12px; background: var(--bg); 
            display: none; 
        }
        .expanded .grid { display: grid; }

        .card { 
            background: var(--card-bg); padding: 20px 15px; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; position: relative; 
            border: 1px solid var(--border); transition: 0.3s;
        }
        .card.opportunity { border: 1px solid var(--success); box-shadow: 0 0 10px rgba(0, 242, 161, 0.15); }

        .buy-label { 
            font-size: 0.55rem; font-weight: 800; color: var(--success); 
            letter-spacing: 1px; margin-bottom: 5px; animation: blink 1.5s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .ticker-link { font-size: 1.2rem; font-weight: 800; color: #3b82f6; text-decoration: none; margin-bottom: 2px; }
        .asset-name { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; }
        
        /* Valor formatado R$ XXX.XXX,XX */
        .price { font-size: 1.5rem; font-weight: 800; margin: 5px 0; white-space: nowrap; }
        
        .var-box { 
            font-size: 0.8rem; font-weight: 700; padding: 5px 10px; border-radius: 4px; margin-top: 5px;
        }
        .up { color: var(--success); background: rgba(0, 242, 161, 0.1); }
        .down { color: var(--danger); background: rgba(255, 77, 109, 0.1); }

        .info-footer { margin-top: 15px; padding-top: 10px; border-top: 1px solid var(--border); width: 100%; text-align: center; }
        .info-label { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; display: block; }
        .info-value { font-size: 0.85rem; font-weight: 700; color: var(--warning); }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .price { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>GTB TERMINAL</h1>
        <p>Dashboard Estratégico 📈</p>
    </div>

    <div class="btn-container">
        <button class="btn" onclick="toggleAll(true)">EXPANDIR TUDO</button>
        <button class="btn" onclick="toggleAll(false)">RECOLHER TUDO</button>
    </div>

    <div id="dashboard-content" style="width: 100%; max-width: 1100px;"></div>
</div>

<script>
    const API_TOKEN_BRAPI = 'nctccHqqPkRvTdxGsZeK2f';
    const config = { "BBAS3": 30.00, "ITUB4": 45.00, "KLBN11": 22.00, "MXRF11": 10.50 };

    const sectors = {
        "Criptomoedas": { "BTCBRL": "Bitcoin", "ETHBRL": "Ethereum", "SOLBRL": "Solana", "BNBBRL": "Binance Coin" },
        "Bancos & Seguros": { "BBAS3": "Banco do Brasil", "BBDC4": "Bradesco", "ITUB4": "Itaú", "CXSE3": "Caixa", "BBSE3": "BB Seguridade" },
        "FIIs": { "MXRF11": "Maxi Renda", "HGLG11": "CSHG Logística", "XPLG11": "XP Log" },
        "Papel & Indústria": { "KLBN11": "Klabin", "WEGE3": "WEG S.A" }
    };

    function formatCurrency(value) {
        return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
    }

    function createStructure() {
        const container = document.getElementById('dashboard-content');
        container.innerHTML = '';
        for (const [name, list] of Object.entries(sectors)) {
            const id = name.replace(/[^a-zA-Z]/g, '');
            container.innerHTML += `
                <div class="sector-section" id="sec-${id}">
                    <div class="sector-header" onclick="toggleSector('${id}')">
                        <span class="sector-title">${name} (${Object.keys(list).length})</span>
                        <span>▼</span>
                    </div>
                    <div class="grid" id="grid-${id}"></div>
                </div>`;
        }
    }

    // Lógica para Criptomoedas (Tempo Real via Binance)
    async function loadCryptos() {
        const grid = document.getElementById('grid-Criptomoedas');
        grid.innerHTML = '';
        const pairs = Object.keys(sectors.Criptomoedas);

        for (const pair of pairs) {
            const tickerHtml = `
                <div class="card" id="card-${pair}">
                    <a href="https://www.google.com/finance/quote/${pair.replace('BRL', '-BRL')}" target="_blank" class="ticker-link">${pair}</a>
                    <span class="asset-name">${sectors.Criptomoedas[pair]}</span>
                    <span class="price" id="price-${pair}">Carregando...</span>
                    <span class="var-box" id="var-${pair}">--% | --</span>
                </div>`;
            grid.innerHTML += tickerHtml;
        }

        // Atualização contínua
        const updatePrice = async () => {
            for (const pair of pairs) {
                try {
                    const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${pair}`);
                    const data = await res.json();
                    const priceEl = document.getElementById(`price-${pair}`);
                    const varEl = document.getElementById(`var-${pair}`);
                    
                    const price = parseFloat(data.lastPrice);
                    const percent = parseFloat(data.priceChangePercent);
                    const change = parseFloat(data.priceChange);

                    priceEl.innerText = formatCurrency(price);
                    varEl.innerText = `${percent >= 0 ? '+' : ''}${percent.toFixed(2)}% | ${formatCurrency(Math.abs(change))}`;
                    varEl.className = `var-box ${percent >= 0 ? 'up' : 'down'}`;
                } catch (e) { console.error("Erro na Binance API", e); }
            }
        };
        updatePrice();
        setInterval(updatePrice, 5000); // Atualiza a cada 5 segundos
    }

    // Lógica para Ações e FIIs (BRAPI)
    async function loadStocks() {
        for (const [sector, list] of Object.entries(sectors)) {
            if (sector === "Criptomoedas") continue;
            const grid = document.getElementById(`grid-${sector.replace(/[^a-zA-Z]/g, '')}`);
            
            for (const ticker in list) {
                try {
                    const res = await fetch(`https://brapi.dev/api/quote/${ticker}?token=${API_TOKEN_BRAPI}`);
                    const data = await res.json();
                    const asset = data.results[0];
                    if (!asset) continue;

                    const teto = config[ticker] || 0;
                    const isOpp = teto > 0 && asset.regularMarketPrice <= teto;
                    const isUp = asset.regularMarketChangePercent >= 0;

                    grid.innerHTML += `
                        <div class="card ${isOpp ? 'opportunity' : ''}">
                            ${isOpp ? '<span class="buy-label">OPORTUNIDADE DE COMPRA</span>' : ''}
                            <a href="https://www.google.com/finance/quote/${ticker}:BVMF" target="_blank" class="ticker-link">${ticker}</a>
                            <span class="asset-name">${list[ticker]}</span>
                            <span class="price">${formatCurrency(asset.regularMarketPrice)}</span>
                            <span class="var-box ${isUp?'up':'down'}">
                                ${isUp?'+':''}${asset.regularMarketChangePercent.toFixed(2)}% | ${formatCurrency(Math.abs(asset.regularMarketChange))}
                            </span>
                            <div class="info-footer">
                                <span class="info-label">Preço Teto</span>
                                <span class="info-value">${teto > 0 ? formatCurrency(teto) : '---'}</span>
                            </div>
                        </div>`;
                } catch (e) { console.error("Erro na BRAPI", e); }
            }
        }
    }

    function toggleSector(id) { document.getElementById(`sec-${id}`).classList.toggle('expanded'); }
    function toggleAll(expand) { document.querySelectorAll('.sector-section').forEach(s => expand ? s.classList.add('expanded') : s.classList.remove('expanded')); }

    createStructure();
    loadCryptos();
    loadStocks();
</script>
</body>
</html>
