<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro | Consulta Ações B3</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 { font-size: 2rem; margin-bottom: 5px; }
        .header p { color: var(--text-muted); font-size: 0.9rem; }

        /* Grade de Cards */
        .stocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .stock-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .stock-card:hover {
            transform: translateY(-5px);
            border-color: #3b82f6;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .ticker { font-size: 1.4rem; font-weight: 800; color: #3b82f6; }
        .company-name { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            display: block;
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Valor Principal em Destaque */
        .price-container {
            text-align: center;
            padding: 15px 0;
        }

        .current-price {
            font-size: 2.2rem;
            font-weight: 800;
            display: block;
        }

        .variation-box {
            font-size: 0.95rem;
            font-weight: 600;
            margin-top: 4px;
        }

        /* Rodapé do Card */
        .card-footer {
            border-top: 1px solid var(--border);
            margin-top: 15px;
            padding-top: 12px;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }

        .footer-item span { color: var(--text-muted); display: block; margin-bottom: 2px; }
        .footer-item strong { color: var(--text-main); }

        /* Cores Dinâmicas */
        .up { color: var(--success) !important; }
        .down { color: var(--danger) !important; }

        .market-status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #000;
            text-align: center;
            padding: 8px;
            font-size: 0.75rem;
            font-weight: bold;
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Monitor B3 - Alumar</h1>
    <p id="lastUpdate">Atualizando dados...</p>
</div>

<div class="stocks-grid" id="stocksGrid">
    </div>

<div class="market-status-bar" id="marketStatusBar">
    VERIFICANDO STATUS DO MERCADO...
</div>

<script>
    const API_TOKEN = 'nctccHqqPkRvTdxGsZeK2f'; 
    // Lista de ações em ordem alfabética
    const tickers = [
        "BBAS3", "BBDC4", "BBSE3", "BTHF11", "CXSE3", 
        "EQTL3", "ITUB4", "KLBN11", "MXRF11", "TAEE11", "UNIP6", "WEGE3"
    ];

    async function updateDashboard() {
        try {
            // Chamada em lote (batch) para economizar requisições e carregar tudo junto
            const response = await fetch(`https://brapi.dev/api/quote/${tickers.join(',')}?token=${API_TOKEN}`);
            const data = await response.json();
            
            const grid = document.getElementById('stocksGrid');
            grid.innerHTML = ''; // Limpa para atualizar

            data.results.forEach(stock => {
                const isUp = stock.regularMarketChangePercent >= 0;
                const colorClass = isUp ? 'up' : 'down';
                const sign = isUp ? '+' : '';

                const card = `
                    <div class="stock-card">
                        <div class="card-header">
                            <div>
                                <span class="ticker">${stock.symbol}</span>
                                <span class="company-name">${stock.shortName}</span>
                            </div>
                        </div>

                        <div class="price-container">
                            <span class="current-price ${colorClass}">R$ ${stock.regularMarketPrice.toFixed(2)}</span>
                            <div class="variation-box ${colorClass}">
                                ${sign}${stock.regularMarketChange.toFixed(2)} (${sign}${stock.regularMarketChangePercent.toFixed(2)}%)
                            </div>
                        </div>

                        <div class="card-footer">
                            <div class="footer-item">
                                <span>Abertura</span>
                                <strong>R$ ${stock.regularMarketOpen.toFixed(2)}</strong>
                            </div>
                            <div class="footer-item" style="text-align: right;">
                                <span>Máx. Dia</span>
                                <strong>R$ ${stock.regularMarketDayHigh.toFixed(2)}</strong>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });

            document.getElementById('lastUpdate').innerText = `Última atualização: ${new Date().toLocaleTimeString()}`;
            checkMarket();

        } catch (error) {
            console.error("Erro ao carregar dados:", error);
            document.getElementById('marketStatusBar').innerText = "ERRO NA CONEXÃO COM A B3";
        }
    }

    function checkMarket() {
        const now = new Date();
        const day = now.getDay();
        const hour = now.getHours();
        const isWeekend = (day === 0 || day === 6);
        const isOpen = !isWeekend && hour >= 10 && hour < 18;

        const bar = document.getElementById('marketStatusBar');
        if (isOpen) {
            bar.innerHTML = `<span style="color: #10b981">● MERCADO ABERTO</span>`;
        } else {
            bar.innerHTML = `<span style="color: #94a3b8">● MERCADO FECHADO</span>`;
        }
    }

    // Inicializa e define intervalo de 2 minutos
    updateDashboard();
    setInterval(updateDashboard, 120000);
</script>

</body>
</html>
