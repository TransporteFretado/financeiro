<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTB Terminal | Estratégico</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e11; --card-bg: #161a1e; --text-main: #e3e6e8;
            --text-muted: #707a8a; --border: #2b3139; --accent: #ffffff;
            --success: #00f2a1; --danger: #ff4d6d; --warning: #ffb800;
        }
        [data-theme="light"] {
            --bg: #f0f2f5; --card-bg: #ffffff; --text-main: #1a1e23;
            --text-muted: #5f6673; --border: #dcdfe4; --accent: #1a1e23;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text-main); transition: 0.5s; overflow-x: hidden; }

        /* Ticker Tape Superior */
        .ticker-wrap {
            width: 100%; background: var(--card-bg); border-bottom: 1px solid var(--border);
            overflow: hidden; position: sticky; top: 0; z-index: 1000; padding: 12px 0;
        }
        .ticker-move {
            display: flex; white-space: nowrap; animation: tickerMove 35s linear infinite; width: fit-content;
        }
        @keyframes tickerMove { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .ticker-item { padding: 0 40px; font-size: 0.75rem; font-weight: 800; border-right: 1px solid var(--border); }

        .container { display: flex; flex-direction: column; align-items: center; padding: 30px 10px; }
        .header h1 { font-size: 2rem; font-weight: 900; }
        .header p { font-size: 0.8rem; color: var(--text-muted); margin-top: 5px; font-weight: 600; }

        .btn-container { display: flex; gap: 10px; margin: 25px 0; }
        .btn {
            background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border);
            padding: 10px 20px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; cursor: pointer;
        }

        .sector-section { width: 100%; max-width: 1100px; margin-bottom: 12px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .sector-header { padding: 18px 25px; display: flex; justify-content: space-between; cursor: pointer; align-items: center; background: rgba(0,0,0,0.1); }
        .sector-title { font-size: 0.8rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1px; background: var(--border); display: none; }
        .expanded .grid { display: grid; }

        /* Card Layout */
        .card { background: var(--card-bg); padding: 35px 15px; display: flex; flex-direction: column; align-items: center; position: relative; }
        
        .buy-label { 
            font-size: 0.55rem; font-weight: 800; color: var(--success); 
            letter-spacing: 1px; margin-bottom: 6px; 
            animation: blink 1.5s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .ticker-link { font-size: 1.3rem; font-weight: 800; color: #3b82f6; text-decoration: none; }
        .ticker-link:hover { text-decoration: underline; }
        
        .price { font-size: 1.9rem; font-weight: 800; margin: 10px 0; }
        .var-box { font-size: 0.85rem; font-weight: 700; }
        
        .up { color: var(--success); } .down { color: var(--danger); }

        /* Gráfico TradingView Pequeno */
        .crypto-card { padding: 20px 10px; height: 320px; }
        .tv-widget { width: 100%; height: 200px; border: none; border-radius: 8px; margin-top: 10px; }

        .info-footer { margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); width: 100%; text-align: center; }
        .info-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; display: block; }
        .info-value { font-size: 1rem; font-weight: 700; color: var(--warning); }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div class="ticker-move" id="tickerTape">Carregando índices globais...</div>
</div>

<div class="container">
    <div class="header" style="text-align: center;">
        <h1>GTB TERMINAL</h1>
        <p>Dashboard Estratégico 📈</p>
    </div>

    <div class="btn-container">
        <button class="btn" onclick="toggleAll(true)">EXPANDIR TUDO</button>
        <button class="btn" onclick="toggleAll(false)">RECOLHER TUDO</button>
    </div>

    <div id="dashboard-content" style="width: 100%; max-width: 1100px;"></div>
</div>

<script>
    const API_TOKEN = 'nctccHqqPkRvTdxGsZeK2f';
    const config = { "BBAS3": 30.00, "ITUB4": 45.00, "KLBN11": 22.00, "MXRF11": 10.50 };

    const sectors = {
        "Criptomoedas": ["BTCBRL", "ETHBRL", "SOLBRL", "BNBBRL"],
        "Bancos & Seguros": { "BBAS3": "Banco do Brasil", "BBDC4": "Bradesco", "ITUB4": "Itaú", "CXSE3": "Caixa", "BBSE3": "BB Seguridade" },
        "FIIs": { "MXRF11": "Maxi Renda", "HGLG11": "CSHG Logística", "XPLG11": "XP Log" },
        "Papel & Indústria": { "KLBN11": "Klabin", "WEGE3": "WEG S.A" }
    };

    function setTheme() {
        const hour = new Date().getHours();
        document.documentElement.setAttribute('data-theme', (hour >= 6 && hour < 18) ? 'light' : 'dark');
    }

    async function loadTicker() {
        try {
            const res = await fetch(`https://brapi.dev/api/quote/^BVSP,IFIX.SA,USDBRL,^GSPC?token=${API_TOKEN}`);
            const data = await res.json();
            const tape = document.getElementById('tickerTape');
            let html = '';
            data.results.forEach(idx => {
                const names = {"^BVSP":"IBOVESPA", "IFIX.SA":"IFIX", "USDBRL":"DÓLAR", "^GSPC":"S&P 500"};
                const isUp = idx.regularMarketChangePercent >= 0;
                html += `
                    <div class="ticker-item">
                        ${names[idx.symbol]} <span style="color:var(--accent)">${idx.regularMarketPrice.toLocaleString('pt-BR')}</span>
                        <span class="${isUp?'up':'down'}">${isUp?'+':''}${idx.regularMarketChangePercent.toFixed(2)}%</span>
                    </div>`;
            });
            tape.innerHTML = html + html;
        } catch (e) {}
    }

    function createStructure() {
        const container = document.getElementById('dashboard-content');
        container.innerHTML = '';
        for (const [name, list] of Object.entries(sectors)) {
            const id = name.replace(/[^a-zA-Z]/g, '');
            const count = Array.isArray(list) ? list.length : Object.keys(list).length;
            container.innerHTML += `
                <div class="sector-section" id="sec-${id}">
                    <div class="sector-header" onclick="toggleSector('${id}')">
                        <span class="sector-title">${name} (${count})</span>
                        <span>▼</span>
                    </div>
                    <div class="grid" id="grid-${id}"></div>
                </div>`;
        }
    }

    async function loadAssets() {
        for (const [sector, list] of Object.entries(sectors)) {
            const gridId = sector.replace(/[^a-zA-Z]/g, '');
            const grid = document.getElementById(`grid-${gridId}`);
            
            if (sector === "Criptomoedas") {
                list.forEach(coin => {
                    grid.innerHTML += `
                        <div class="card crypto-card">
                            <a href="https://www.google.com/finance/quote/${coin}" target="_blank" class="ticker-link">${coin}</a>
                            <iframe class="tv-widget" src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:${coin}&interval=D&theme=dark"></iframe>
                        </div>`;
                });
            } else {
                for (const ticker in list) {
                    try {
                        const res = await fetch(`https://brapi.dev/api/quote/${ticker}?token=${API_TOKEN}`);
                        const data = await res.json();
                        const asset = data.results[0];
                        if (asset) {
                            const teto = config[ticker] || 0;
                            const isOpp = teto > 0 && asset.regularMarketPrice <= teto;
                            const isUp = asset.regularMarketChangePercent >= 0;
                            grid.innerHTML += `
                                <div class="card">
                                    ${isOpp ? '<span class="buy-label">OPORTUNIDADE DE COMPRA</span>' : ''}
                                    <a href="https://www.google.com/finance/quote/${ticker}:BVMF" target="_blank" class="ticker-link">${ticker}</a>
                                    <span style="font-size:0.55rem; color:var(--text-muted); text-transform:uppercase">${list[ticker]}</span>
                                    <span class="price">R$ ${asset.regularMarketPrice.toLocaleString('pt-BR', {minimumFractionDigits:2})}</span>
                                    <span class="var-box ${isUp?'up':'down'}">
                                        ${isUp?'+':''}${asset.regularMarketChangePercent.toFixed(2)}% | R$ ${Math.abs(asset.regularMarketChange).toFixed(2)}
                                    </span>
                                    <div class="info-footer">
                                        <span class="info-label">Preço Teto</span>
                                        <span class="info-value">${teto > 0 ? 'R$ '+teto.toFixed(2) : '---'}</span>
                                    </div>
                                </div>`;
                        }
                    } catch (e) {}
                }
            }
        }
    }

    function toggleSector(id) { document.getElementById(`sec-${id}`).classList.toggle('expanded'); }
    function toggleAll(expand) { document.querySelectorAll('.sector-section').forEach(s => expand ? s.classList.add('expanded') : s.classList.remove('expanded')); }

    setTheme();
    createStructure();
    loadTicker();
    loadAssets();
    setInterval(loadTicker, 30000);
</script>
</body>
</html>
