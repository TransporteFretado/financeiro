<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dash Estratégico</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e11; --card-bg: #161a1e; --text-main: #e3e6e8;
            --text-muted: #707a8a; --border: #2b3139; --success: #00f2a1; --danger: #ff4d6d; --warning: #ffb800;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text-main); padding-bottom: 80px; }
        
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 15px; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; font-weight: 800; text-transform: uppercase; color: #fff; }
        
        .btn-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .btn { flex: 1; max-width: 180px; background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border); padding: 14px; border-radius: 10px; font-size: 0.7rem; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn:active { background: var(--border); }

        .sector-section { margin-bottom: 12px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
        .sector-header { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: rgba(255,255,255,0.02); }
        .sector-title { font-size: 0.8rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        /* Grid Inteligente */
        .grid { display: none; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; padding: 15px; background: var(--bg); }
        .expanded .grid { display: grid; }

        /* Card Ações B3 */
        .card { background: var(--card-bg); padding: 25px 20px; border-radius: 12px; border: 1px solid var(--border); text-align: center; display: flex; flex-direction: column; align-items: center; position: relative; }
        .card.opportunity { border: 2px solid var(--success); background: linear-gradient(180deg, rgba(0, 242, 161, 0.05) 0%, rgba(22, 26, 30, 1) 100%); }

        .buy-label { font-size: 0.6rem; font-weight: 800; color: var(--success); margin-bottom: 10px; letter-spacing: 1px; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }

        .ticker-link { font-size: 1.4rem; font-weight: 800; color: #3b82f6; text-decoration: none; margin-bottom: 4px; }
        .asset-name { font-size: 0.65rem; color: var(--text-muted); font-weight: 600; margin-bottom: 15px; text-transform: uppercase; }
        
        .price { font-size: 1.8rem; font-weight: 800; margin-bottom: 6px; color: #fff; }
        
        .variation-row { font-size: 0.9rem; font-weight: 700; display: flex; gap: 8px; align-items: center; margin-bottom: 15px; padding: 5px 12px; border-radius: 6px; }
        .up { color: var(--success); background: rgba(0, 242, 161, 0.1); }
        .down { color: var(--danger); background: rgba(255, 77, 109, 0.1); }

        /* Card Cripto */
        .crypto-box { width: 100%; height: 140px; border-radius: 8px; overflow: hidden; }

        .info-footer { margin-top: 10px; padding-top: 12px; border-top: 1px solid var(--border); width: 100%; }
        .info-label { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; font-weight: 800; display: block; margin-bottom: 4px; }
        .info-value { font-size: 1rem; font-weight: 800; color: var(--warning); }

        /* Mercado Footer Fixo */
        .market-footer { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: #1a1e23; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 10px; z-index: 9999; font-size: 0.7rem; font-weight: 800; box-shadow: 0 -4px 10px rgba(0,0,0,0.3); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-open { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .dot-closed { background: var(--danger); box-shadow: 0 0 10px var(--danger); }

        /* Mobile Fix - Forçar 1 coluna e cards largos */
        @media (max-width: 600px) { 
            .grid { grid-template-columns: 1fr !important; padding: 10px; } 
            .card { padding: 30px 20px; }
            .btn { padding: 15px; font-size: 0.75rem; }
            .header h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>Dash Estratégico</h1></div>
    <div class="btn-container">
        <button class="btn" onclick="toggleAll(true)">EXPANDIR TUDO</button>
        <button class="btn" onclick="toggleAll(false)">RECOLHER TUDO</button>
    </div>
    <div id="dashboard-content"></div>
</div>

<div class="market-footer">
    <div id="dot" class="status-dot"></div>
    <span id="statusText">SINCRONIZANDO...</span>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    const API_TOKEN = 'nctccHqqPkRvTdxGsZeK2f';
    const config = { "BBAS3": 30.00, "ITUB4": 45.00, "KLBN11": 22.00, "MXRF11": 10.50 };

    const sectors = {
        "Criptomoedas": { "BTCBRL": "Bitcoin", "ETHBRL": "Ethereum", "SOLBRL": "Solana", "BNBBRL": "Binance" },
        "Bancos & Seguros": { "BBAS3": "Banco do Brasil", "BBDC4": "Bradesco", "ITUB4": "Itaú", "CXSE3": "Caixa Seg", "BBSE3": "BB Seg" },
        "FIIs": { "MXRF11": "Maxi Renda", "HGLG11": "CSHG Log", "XPLG11": "XP Log" },
        "Papel & Indústria": { "KLBN11": "Klabin", "WEGE3": "WEG S.A" }
    };

    function updateClock() {
        const now = new Date();
        const isOpen = (now.getDay() >= 1 && now.getDay() <= 5) && (now.getHours() >= 10 && now.getHours() < 18);
        document.getElementById('dot').className = `status-dot ${isOpen ? 'dot-open' : 'dot-closed'}`;
        document.getElementById('statusText').innerText = `B3 ${isOpen ? 'ABERTO' : 'FECHADO'} | CRIPTO 24H - ${now.toLocaleTimeString('pt-BR')}`;
    }

    async function init() {
        const container = document.getElementById('dashboard-content');
        for (const [name, list] of Object.entries(sectors)) {
            const id = name.replace(/\s/g, '');
            container.innerHTML += `
                <div class="sector-section" id="sec-${id}">
                    <div class="sector-header" onclick="toggleSector('${id}')">
                        <span class="sector-title">${name}</span>
                        <span>▼</span>
                    </div>
                    <div class="grid" id="grid-${id}"></div>
                </div>`;
            
            const grid = document.getElementById(`grid-${id}`);
            for (const ticker in list) {
                if (name === "Criptomoedas") {
                    renderCrypto(grid, ticker);
                } else {
                    await renderStock(grid, ticker, list[ticker]);
                }
            }
        }
    }

    function renderCrypto(grid, ticker) {
        const divId = `tv_${ticker}`;
        grid.innerHTML += `<div class="card"><div id="${divId}" class="crypto-box"></div></div>`;
        new TradingView.MediumWidget({
            "symbols": [[`BINANCE:${ticker}|1D`]],
            "chartOnly": false, "width": "100%", "height": "100%", "locale": "br",
            "colorTheme": "dark", "gridLineColor": "transparent", "trendLineColor": "#3b82f6",
            "isTransparent": true, "autosize": true, "container_id": divId
        });
    }

    async function renderStock(grid, ticker, name) {
        try {
            const res = await fetch(`https://brapi.dev/api/quote/${ticker}?token=${API_TOKEN}`);
            const data = await res.json();
            const asset = data.results[0];
            const teto = config[ticker] || 0;
            const isOpp = teto > 0 && asset.regularMarketPrice <= teto;
            const isUp = asset.regularMarketChangePercent >= 0;

            grid.innerHTML += `
                <div class="card ${isOpp ? 'opportunity' : ''}">
                    ${isOpp ? '<span class="buy-label">OPORTUNIDADE DE COMPRA</span>' : ''}
                    <a href="https://www.google.com/finance/quote/${ticker}:BVMF" target="_blank" class="ticker-link">${ticker}</a>
                    <span class="asset-name">${name}</span>
                    <span class="price">R$ ${asset.regularMarketPrice.toLocaleString('pt-BR', {minimumFractionDigits:2})}</span>
                    <div class="variation-row ${isUp ? 'up' : 'down'}">
                        <span>${isUp ? '▲' : '▼'} ${asset.regularMarketChangePercent.toFixed(2)}%</span>
                        <span style="opacity: 0.3">|</span>
                        <span>R$ ${Math.abs(asset.regularMarketChange).toFixed(2)}</span>
                    </div>
                    <div class="info-footer">
                        <span class="info-label">Preço Teto</span>
                        <span class="info-value">R$ ${teto > 0 ? teto.toFixed(2) : '---'}</span>
                    </div>
                </div>`;
        } catch (e) { console.error("Erro:", ticker); }
    }

    function toggleSector(id) { document.getElementById(`sec-${id}`).classList.toggle('expanded'); }
    function toggleAll(expand) { document.querySelectorAll('.sector-section').forEach(s => expand ? s.classList.add('expanded') : s.classList.remove('expanded')); }

    init();
    setInterval(updateClock, 1000);
</script>
</body>
</html>
