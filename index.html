<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor B3 | GTB Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: #161b2b;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --border: #2d3748;
            --accent: #3b82f6;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 15px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 25px; width: 100%; }
        .header h1 { font-size: clamp(1.5rem, 5vw, 2.2rem); font-weight: 800; margin: 0; color: var(--accent); }
        .header p { color: var(--text-muted); margin-top: 5px; font-size: 0.9rem; }

        /* Grid Responsiva: Ajusta colunas conforme o tamanho da tela */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1200px;
            padding-bottom: 80px; /* Espaço para o rodapé */
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card:hover { transform: translateY(-3px); border-color: var(--accent); }

        /* Hierarquia pedida: Ticker em destaque, Nome menor abaixo */
        .ticker-highlight { 
            font-size: 1.6rem; 
            font-weight: 800; 
            color: var(--accent); 
            display: block;
            letter-spacing: -0.5px;
        }
        
        .company-sub { 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            font-weight: 400;
            display: block;
            margin-bottom: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .price-main {
            font-size: 2.8rem;
            font-weight: 800;
            margin: 5px 0;
            display: block;
            line-height: 1;
        }

        .variation-sub {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .details {
            display: flex;
            justify-content: center;
            border-top: 1px solid var(--border);
            padding-top: 15px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .up { color: var(--success); }
        .down { color: var(--danger); }

        /* Status fixo no rodapé */
        .footer-status {
            position: fixed;
            bottom: 15px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: bold;
            border: 1px solid var(--border);
            z-index: 100;
        }

        /* Ajustes para telas muito pequenas (Celulares antigos) */
        @media (max-width: 350px) {
            .grid { grid-template-columns: 1fr; }
            .price-main { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>GTB Solution</h1>
    <p id="timer">Buscando dados em tempo real...</p>
</div>

<div class="grid" id="stocksGrid">
    </div>

<div class="footer-status" id="marketStatus">
    CONECTANDO À B3...
</div>

<script>
    const API_TOKEN = 'nctccHqqPkRvTdxGsZeK2f';
    const tickers = [
        "BBAS3", "BBDC4", "BBSE3", "BTHF11", "CXSE3", 
        "EQTL3", "ITUB4", "KLBN11", "MXRF11", "TAEE11", "UNIP6", "WEGE3"
    ];

    async function loadStocks() {
        const grid = document.getElementById('stocksGrid');
        
        // Fazemos requisições individuais para evitar bloqueio no plano gratuito
        for (const ticker of tickers) {
            try {
                const response = await fetch(`https://brapi.dev/api/quote/${ticker}?token=${API_TOKEN}`);
                const data = await response.json();
                
                if (data.results && data.results[0]) {
                    const stock = data.results[0];
                    updateOrCreateCard(stock);
                }
            } catch (e) {
                console.error("Erro no ticker " + ticker, e);
            }
        }
        document.getElementById('marketStatus').innerText = "ATUALIZADO ÀS " + new Date().toLocaleTimeString();
    }

    function updateOrCreateCard(stock) {
        const grid = document.getElementById('stocksGrid');
        let card = document.getElementById(`card-${stock.symbol}`);
        
        const isUp = stock.regularMarketChangePercent >= 0;
        const colorClass = isUp ? 'up' : 'down';
        const sign = isUp ? '+' : '';

        const cardHTML = `
            <span class="ticker-highlight">${stock.symbol}</span>
            <span class="company-sub">${stock.shortName}</span>
            <span class="price-main ${colorClass}">R$ ${stock.regularMarketPrice.toFixed(2)}</span>
            <div class="variation-sub ${colorClass}">
                ${sign}${stock.regularMarketChangePercent.toFixed(2)}% (R$ ${stock.regularMarketChange.toFixed(2)})
            </div>
            <div class="details">
                Abertura: <strong style="color:white; margin-left:8px;">R$ ${stock.regularMarketOpen.toFixed(2)}</strong>
            </div>
        `;

        if (card) {
            card.innerHTML = cardHTML;
        } else {
            const newCard = document.createElement('div');
            newCard.id = `card-${stock.symbol}`;
            newCard.className = 'card';
            newCard.innerHTML = cardHTML;
            grid.appendChild(newCard);
        }
    }

    // Inicialização
    loadStocks();
    
    // Atualização automática a cada 60 segundos
    setInterval(loadStocks, 60000);
</script>

</body>
</html>
