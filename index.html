<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Financeiro | Consulta Ações B3</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --text: #f8fafc;
            --muted: #94a3b8;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }

        .header-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        .value-box { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid #334155;
            text-align: right;
            min-width: 200px;
        }
        .price-large { font-size: 2.8rem; font-weight: 800; line-height: 1; }
        .variation-badge { 
            display: inline-block; 
            margin-top: 8px; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-weight: bold; 
            font-size: 1.1rem; 
        }

        .info-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; 
            margin-bottom: 20px; 
        }
        .info-card { 
            background: var(--card); 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid #334155;
            text-align: center;
        }
        .info-card span { display: block; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
        .info-card strong { font-size: 1.2rem; }

        .chart-box { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #334155; margin-bottom: 20px; min-height: 350px; }
        
        /* Estilização do Campo de Pesquisa */
        .search-box { margin-bottom: 20px; position: relative; }
        .search-box label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--muted); }
        input#stockSearch { 
            width: 100%; 
            background: #1e293b; 
            color: white; 
            border: 2px solid #3b82f6; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 1rem; 
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        input#stockSearch:focus { border-color: var(--success); }

        .market-status {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            font-weight: 800;
            text-transform: uppercase;
            margin-top: 20px;
        }
        .status-open { background: var(--success); color: #064e3b; }
        .status-closed { background: #000000; color: #ffffff; border: 1px solid #334155; }
        
        .up { color: var(--success); }
        .down { color: var(--danger); }
        .bg-up { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .bg-down { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-main">
        <div>
            <h1 id="tickerName" style="margin:0; font-size: 2.5rem;">Carregando...</h1>
            <p id="companyName" style="margin:5px 0; color:var(--muted); font-size: 1.1rem;">Buscando dados na B3...</p>
        </div>
        <div class="value-box">
            <div id="mainPrice" class="price-large">R$ 0,00</div>
            <div id="variation" class="variation-badge">0.00%</div>
        </div>
    </div>

    <div class="search-box">
        <label for="stockSearch">Pesquisar ou Selecionar Ativo:</label>
        <input list="stockOptions" id="stockSearch" placeholder="Ex: BBAS3 ou Banco do Brasil..." oninput="handleSearch(this.value)">
        <datalist id="stockOptions">
            <option value="BBAS3">Banco do Brasil</option>
            <option value="BBSE3">BB Seguridade</option>
            <option value="BBDC4">Bradesco</option>
            <option value="CXSE3">Caixa Seguridade</option>
            <option value="ITUB4">Itaú Unibanco</option>
            <option value="EQTL3">Equatorial</option>
            <option value="KLBN11">Klabin</option>
            <option value="TAEE11">Taesa</option>
            <option value="UNIP6">Unipar</option>
            <option value="WEGE3">WEG</option>
            <option value="BTHF11">BTG Logística</option>
            <option value="MXRF11">Maxi Renda</option>
        </datalist>
    </div>

    <div class="info-grid">
        <div class="info-card">
            <span>Última Atualização</span>
            <strong id="timeUpdate">--:--:--</strong>
        </div>
        <div class="info-card">
            <span>Abertura do Mercado</span>
            <strong>10:00</strong>
        </div>
        <div class="info-card">
            <span>Preço de Abertura</span>
            <strong id="priceOpenDay">R$ 0,00</strong>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="stockChart"></canvas>
    </div>

    <div id="marketStatusLabel" class="market-status">Verificando...</div>
</div>

<script>
    let myChart = null;
    const API_TOKEN = 'nctccHqqPkRvTdxGsZeK2f'; 
    let currentTicker = "BBAS3"; // Valor inicial

    // Função que detecta quando o usuário seleciona ou digita um ticker válido
    function handleSearch(val) {
        const options = document.getElementById('stockOptions').options;
        for (let i = 0; i < options.length; i++) {
            if (options[i].value === val.toUpperCase()) {
                currentTicker = val.toUpperCase();
                fetchData(currentTicker);
                break;
            }
        }
    }

    async function fetchData(ticker) {
        try {
            const response = await fetch(`https://brapi.dev/api/quote/${ticker}?token=${API_TOKEN}`);
            
            if (!response.ok) throw new Error(`Status: ${response.status}`);

            const data = await response.json();
            if (!data.results || data.results.length === 0) throw new Error("Ativo não encontrado");
            
            const stock = data.results[0];

            document.getElementById('tickerName').innerText = stock.symbol;
            document.getElementById('companyName').innerText = stock.shortName;
            
            const preco = stock.regularMarketPrice || 0;
            const variacao = stock.regularMarketChangePercent || 0;
            const abertura = stock.regularMarketOpen || 0;
            
            document.getElementById('mainPrice').innerText = `R$ ${preco.toFixed(2)}`;
            document.getElementById('priceOpenDay').innerText = `R$ ${abertura.toFixed(2)}`;
            document.getElementById('timeUpdate').innerText = new Date().toLocaleTimeString();

            const varBadge = document.getElementById('variation');
            varBadge.innerText = (variacao >= 0 ? '+' : '') + variacao.toFixed(2) + '%';
            varBadge.className = 'variation-badge ' + (variacao >= 0 ? 'bg-up' : 'bg-down');
            document.getElementById('mainPrice').className = 'price-large ' + (variacao >= 0 ? 'up' : 'down');

            let labels = [new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})];
            let prices = [preco];

            if (stock.historicalDataPrice && stock.historicalDataPrice.length > 0) {
                labels = stock.historicalDataPrice.map(h => new Date(h.date * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
                prices = stock.historicalDataPrice.map(h => h.close);
            }

            renderChart(labels, prices, stock.symbol, variacao >= 0 ? '#10b981' : '#ef4444');
            checkMarketStatus();

        } catch (error) {
            console.error("Erro na busca:", error);
            document.getElementById('tickerName').innerText = "Erro na API";
            document.getElementById('companyName').innerText = "Ativo não encontrado ou erro de conexão.";
        }
    }

    function renderChart(labels, data, ticker, color) {
        const ctx = document.getElementById('stockChart').getContext('2d');
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: ticker,
                    data: data,
                    borderColor: color,
                    backgroundColor: color + '1A',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.3,
                    pointRadius: 1,
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { color: '#94a3b8' }, grid: { display: false } },
                    y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
                }
            }
        });
    }

    function checkMarketStatus() {
        const now = new Date();
        const day = now.getDay(); 
        const hour = now.getHours();
        const min = now.getMinutes();
        const totalMin = hour * 60 + min;

        const open = 10 * 60; 
        const close = 17 * 60 + 55; 
        
        const label = document.getElementById('marketStatusLabel');
        const isWeekend = (day === 0 || day === 6);

        if (!isWeekend && totalMin >= open && totalMin <= close) {
            label.innerText = "● Mercado Aberto";
            label.className = "market-status status-open";
        } else {
            label.innerText = `● Mercado Fechado (${isWeekend ? "Fim de Semana" : "Fechamento às 17:55"})`;
            label.className = "market-status status-closed";
        }
    }

    // Inicialização
    fetchData(currentTicker);
    setInterval(() => fetchData(currentTicker), 120000); 
</script>

</body>
</html>
