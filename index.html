<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor B3 | GTB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: #161b2b;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --border: #2d3748;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.2rem; font-weight: 800; margin: 0; }
        .header p { color: var(--text-muted); margin-top: 5px; }

        /* Grid de Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-5px); border-color: #3b82f6; }

        .ticker-header { font-size: 0.9rem; color: var(--text-muted); font-weight: 600; margin-bottom: 2px; }
        .company-name { font-size: 1.1rem; font-weight: 700; color: #3b82f6; margin-bottom: 15px; display: block; }

        /* Valor Atual em Destaque */
        .price-main {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 10px 0;
            display: block;
        }

        .variation-sub {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .details {
            display: flex;
            justify-content: center;
            border-top: 1px solid var(--border);
            padding-top: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .up { color: var(--success); }
        .down { color: var(--danger); }

        .footer-status {
            margin-top: 40px;
            padding: 10px 25px;
            background: #000;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Monitor B3 - Alumar</h1>
    <p id="timer">Próxima atualização em: --s</p>
</div>

<div class="grid" id="stocksGrid">
    </div>

<div class="footer-status" id="marketStatus">
    CARREGANDO DADOS...
</div>

<script>
    const API_TOKEN = 'nctccHqqPkRvTdxGsZeK2f';
    const tickers = [
        "BBAS3", "BBDC4", "BBSE3", "BTHF11", "CXSE3", 
        "EQTL3", "ITUB4", "KLBN11", "MXRF11", "TAEE11", "UNIP6", "WEGE3"
    ];

    async function loadStocks() {
        const grid = document.getElementById('stocksGrid');
        // Não limpamos a grid para evitar o "piscar" da tela, apenas atualizamos o conteúdo
        
        for (const ticker of tickers) {
            try {
                const response = await fetch(`https://brapi.dev/api/quote/${ticker}?token=${API_TOKEN}`);
                const data = await response.json();
                
                if (data.results && data.results[0]) {
                    const stock = data.results[0];
                    updateOrCreateCard(stock);
                }
            } catch (e) {
                console.error("Erro no ticker " + ticker, e);
            }
        }
        document.getElementById('marketStatus').innerText = "ATUALIZADO ÀS " + new Date().toLocaleTimeString();
    }

    function updateOrCreateCard(stock) {
        const grid = document.getElementById('stocksGrid');
        let card = document.getElementById(`card-${stock.symbol}`);
        
        const isUp = stock.regularMarketChangePercent >= 0;
        const colorClass = isUp ? 'up' : 'down';
        const sign = isUp ? '+' : '';

        const cardHTML = `
            <div class="ticker-header">${stock.symbol}</div>
            <span class="company-name">${stock.shortName}</span>
            <span class="price-main ${colorClass}">R$ ${stock.regularMarketPrice.toFixed(2)}</span>
            <div class="variation-sub ${colorClass}">
                ${sign}${stock.regularMarketChangePercent.toFixed(2)}% (R$ ${stock.regularMarketChange.toFixed(2)})
            </div>
            <div class="details">
                Abertura: <strong style="color:white; margin-left:5px;">R$ ${stock.regularMarketOpen.toFixed(2)}</strong>
            </div>
        `;

        if (card) {
            card.innerHTML = cardHTML;
        } else {
            const newCard = document.createElement('div');
            newCard.id = `card-${stock.symbol}`;
            newCard.className = 'card';
            newCard.innerHTML = cardHTML;
            grid.appendChild(newCard);
        }
    }

    // Inicialização e Loop
    loadStocks();
    setInterval(loadStocks, 60000); // Atualiza a cada 1 minuto
</script>

</body>
</html>
