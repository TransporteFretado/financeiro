<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor B3 | GTB Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: #161b2b;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --border: #2d3748;
            --accent: #3b82f6;
        }

        .light-theme {
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #d1d5db;
            --accent: #2563eb;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.5s ease;
        }

        /* --- ESTILO DO TICKER SCROLL --- */
        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background: #000;
            border-bottom: 1px solid var(--border);
            height: 40px;
            display: flex;
            align-items: center;
        }

        .ticker-move {
            display: flex;
            white-space: nowrap;
            animation: ticker 30s linear infinite;
        }

        .ticker-item {
            padding: 0 20px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #fff;
        }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* --- RESTANTE DO LAYOUT --- */
        .header { text-align: center; padding: 20px 10px; width: 100%; }
        .header h1 { font-size: 1.8rem; font-weight: 800; margin: 0; color: var(--accent); }
        .header p { font-size: 0.75rem; color: var(--text-muted); margin-top: 5px; }

        .global-controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-toggle {
            background: var(--border); color: var(--text-main); border: none;
            padding: 8px 15px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; cursor: pointer;
        }

        .sector-section { width: 95%; max-width: 800px; margin-bottom: 10px; border-radius: 12px; overflow: hidden; background: var(--card-bg); border: 1px solid var(--border); }
        .sector-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: rgba(128, 128, 128, 0.1); }
        .sector-title { font-size: 0.85rem; font-weight: 800; color: var(--accent); text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; padding: 15px; }
        .collapsed .grid { display: none; }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
        .price-main { font-size: 1.6rem; font-weight: 800; margin: 2px 0; display: block; }
        .variation-sub { font-size: 0.75rem; font-weight: 600; }

        .up { color: var(--success); }
        .down { color: var(--danger); }

        .footer-status {
            position: fixed; bottom: 10px; padding: 10px 20px; background: var(--card-bg);
            border-radius: 30px; font-size: 0.7rem; font-weight: bold; border: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
        }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-green { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .dot-red { background: var(--danger); }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div class="ticker-move" id="tickerContent">
        </div>
</div>

<div class="header">
    <h1>GTB Solution</h1>
    <p>Carteira de Investimento de Gabriel Naor, Thiago Viegas, Brener Gomes</p>
</div>

<div class="global-controls">
    <button class="btn-toggle" onclick="toggleAll(false)">Expandir Todos</button>
    <button class="btn-toggle" onclick="toggleAll(true)">Recolher Todos</button>
</div>

<div id="dashboard-content" style="width: 100%; max-width: 800px; padding-bottom: 70px; display: flex; flex-direction: column; align-items: center;"></div>

<div class="footer-status" id="marketStatus"></div>

<script>
    const API_TOKEN = 'nctccHqqPkRvTdxGsZeK2f';
    
    // Incluí os ativos do seu print na lista do scroll
    const sectors = {
        "Bancos & Seguros": { "BBAS3": "Banco do Brasil", "BBDC4": "Bradesco", "BBSE3": "BB Seguridade", "CXSE3": "Caixa Seguridade", "ITUB4": "Itaú Unibanco" },
        "Energia": { "EQTL3": "Equatorial Energia", "TAEE11": "Taesa" },
        "Papel & Indústria": { "KLBN3": "Klabin Ord.", "KLBN11": "Klabin Unit", "UNIP6": "Unipar", "WEGE3": "WEG S.A." },
        "Fundos Imobiliários": { "BTHF11": "BTG Logística", "MXRF11": "Maxi Renda" }
    };

    const extras = ["PETR4", "VALE3", "MGLU3", "ABEV3", "GGBR4"]; // Ativos extras para o scroll

    function applyAutoTheme() {
        const hour = new Date().getHours();
        if (hour >= 6 && hour < 18) document.body.classList.add('light-theme');
    }

    function createStructure() {
        const content = document.getElementById('dashboard-content');
        for (const [sectorName, stocks] of Object.entries(sectors)) {
            const sectionId = sectorName.replace(/\s+/g, '');
            const section = document.createElement('div');
            section.className = 'sector-section';
            section.id = `sec-${sectionId}`;
            section.innerHTML = `
                <div class="sector-header" onclick="toggleSector('${sectionId}')">
                    <span class="sector-title">${sectorName} (${Object.keys(stocks).length})</span>
                    <span>▼</span>
                </div>
                <div class="grid" id="grid-${sectionId}"></div>
            `;
            content.appendChild(section);
        }
    }

    async function loadStocks() {
        const tickerContainer = document.getElementById('tickerContent');
        tickerContainer.innerHTML = '';
        let tickerHTML = '';

        const allTickers = [...Object.keys(sectors).flatMap(s => Object.keys(sectors[s])), ...extras];

        for (const ticker of allTickers) {
            try {
                const response = await fetch(`https://brapi.dev/api/quote/${ticker}?token=${API_TOKEN}`);
                const data = await response.json();
                if (data.results && data.results[0]) {
                    const stock = data.results[0];
                    const isUp = stock.regularMarketChangePercent >= 0;
                    const color = isUp ? '#10b981' : '#ef4444';
                    
                    // Monta item do Scroll
                    const itemHTML = `<div class="ticker-item">${stock.symbol} R$ ${stock.regularMarketPrice.toFixed(2)} <span style="color: ${color}">${isUp?'+':''}${stock.regularMarketChangePercent.toFixed(2)}%</span></div>`;
                    tickerHTML += itemHTML;

                    // Atualiza cards se existirem
                    const sectorGrid = findGridForTicker(ticker);
                    if (sectorGrid) updateCard(stock, sectorGrid);
                }
            } catch (e) { console.error(e); }
        }
        // Duplicamos o conteúdo para o efeito de loop infinito ser perfeito
        tickerContainer.innerHTML = tickerHTML + tickerHTML;
        updateMarketStatus();
    }

    function findGridForTicker(ticker) {
        for (const sectorName in sectors) {
            if (sectors[sectorName][ticker]) return document.getElementById(`grid-${sectorName.replace(/\s+/g, '')}`);
        }
        return null;
    }

    function updateCard(stock, grid) {
        let card = document.getElementById(`card-${stock.symbol}`);
        const isUp = stock.regularMarketChangePercent >= 0;
        const colorClass = isUp ? 'up' : 'down';
        const variationText = `${isUp?'+':''}${stock.regularMarketChangePercent.toFixed(2)}% | R$ ${Math.abs(stock.regularMarketChange).toFixed(2)}`;

        const cardHTML = `
            <span class="ticker-highlight" style="font-weight:800; color:var(--accent)">${stock.symbol}</span>
            <span class="company-sub">${stock.shortName}</span>
            <span class="price-main ${colorClass}">R$ ${stock.regularMarketPrice.toFixed(2)}</span>
            <div class="variation-sub ${colorClass}">${variationText}</div>
        `;

        if (card) card.innerHTML = cardHTML;
        else {
            const newCard = document.createElement('div');
            newCard.id = `card-${stock.symbol}`;
            newCard.className = 'card';
            newCard.innerHTML = cardHTML;
            grid.appendChild(newCard);
        }
    }

    function updateMarketStatus() {
        const now = new Date();
        const isOpen = now.getHours() >= 10 && now.getHours() < 18;
        const statusEl = document.getElementById('marketStatus');
        statusEl.innerHTML = `<div class="status-dot ${isOpen?'dot-green':'dot-red'}"></div>
        <span>Mercado ${isOpen?'Aberto':'Fechado'} | ${now.toLocaleTimeString()}</span>`;
    }

    function toggleSector(id) { document.getElementById(`sec-${id}`).classList.toggle('collapsed'); }
    function toggleAll(hide) { document.querySelectorAll('.sector-section').forEach(s => hide ? s.classList.add('collapsed') : s.classList.remove('collapsed')); }

    applyAutoTheme();
    createStructure();
    loadStocks();
    setInterval(loadStocks, 60000);
</script>
</body>
</html>
