<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Integrado | GTB Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e11;
            --card-bg: #161a1e;
            --accent: #ffffff;
            --success: #00f2a1;
            --danger: #ff4d6d;
            --text-main: #e3e6e8;
            --text-muted: #707a8a;
            --border: #2b3139;
            --link-color: #3b82f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Sora', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.4rem; font-weight: 800; color: var(--accent); text-transform: uppercase; }
        .header p { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }

        .btn-container { display: flex; gap: 8px; margin-bottom: 25px; }
        .btn {
            background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border);
            padding: 10px 18px; border-radius: 4px; font-size: 0.65rem;
            font-weight: 700; cursor: pointer; text-transform: uppercase;
        }

        .sector-section {
            width: 100%; max-width: 900px; margin-bottom: 16px;
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 8px; overflow: hidden;
        }

        .sector-header {
            padding: 14px 20px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; background: rgba(255, 255, 255, 0.02);
        }

        .sector-title { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); 
            gap: 1px; 
            background: var(--border); 
        }
        
        .collapsed .grid { display: none; }

        .card { 
            background: var(--card-bg); 
            padding: 24px 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: space-between;
            min-height: 200px;
        }

        .ticker-link { 
            font-size: 1.1rem; 
            font-weight: 800; 
            color: var(--link-color); 
            text-decoration: none;
            margin-bottom: 2px;
        }
        .ticker-link:hover { text-decoration: underline; }

        .name { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 15px; text-align: center; }
        .price { font-size: 1.7rem; font-weight: 700; margin-bottom: 4px; letter-spacing: -1px; }
        .variation { font-size: 0.8rem; font-weight: 700; }
        .up { color: var(--success); }
        .down { color: var(--danger); }

        .info-footer { 
            margin-top: 15px; padding-top: 12px; 
            border-top: 1px solid rgba(255,255,255,0.03); 
            width: 100%; text-align: center; 
        }
        .info-label { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; }
        .info-value { font-size: 0.85rem; font-weight: 600; }

        .footer-status {
            position: fixed; bottom: 20px; padding: 10px 18px;
            background: #1a1e23; border-radius: 4px; border: 1px solid var(--border);
            font-size: 0.6rem; font-weight: 700; display: flex; align-items: center; gap: 8px;
            z-index: 100;
        }
        .dot { width: 7px; height: 7px; border-radius: 50%; }
        .dot-green { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .dot-red { background: var(--danger); }

        @media (max-width: 480px) { .grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <h1>GTB SOLUTION</h1>
    <p>Monitor Integrado | B3 & Criptomoedas</p>
</div>

<div class="btn-container">
    <button class="btn" onclick="toggleAll(false)">Expandir Todos</button>
    <button class="btn" onclick="toggleAll(true)">Recolher Todos</button>
</div>

<div id="dashboard-content" style="width: 100%; max-width: 900px; padding-bottom: 100px;"></div>

<div class="footer-status" id="marketStatus"></div>

<script>
    const API_TOKEN = 'nctccHqqPkRvTdxGsZeK2f';
    
    const sectors = {
        "Criptomoedas": { "BTC": "Bitcoin", "ETH": "Ethereum", "SOL": "Solana", "BNB": "Binance" },
        "Bancos & Seguros": { "BBAS3": "Banco do Brasil", "BBDC4": "Bradesco", "BBSE3": "BB Seguridade", "CXSE3": "Caixa Seguridade", "ITUB4": "Itaú Unibanco" },
        "Energia": { "EQTL3": "Equatorial Energia", "TAEE11": "Taesa" },
        "Papel & Indústria": { "KLBN3": "Klabin Ord.", "KLBN11": "Klabin Unit", "UNIP6": "Unipar", "WEGE3": "WEG S.A." },
        "Fundos Imobiliários": { "BTHF11": "BTG Logística", "MXRF11": "Maxi Renda" }
    };

    function createStructure() {
        const content = document.getElementById('dashboard-content');
        content.innerHTML = '';
        for (const [sectorName, stocks] of Object.entries(sectors)) {
            const count = Object.keys(stocks).length;
            const sectionId = sectorName.replace(/[^a-zA-Z]/g, '');
            const section = document.createElement('div');
            section.className = 'sector-section';
            section.id = `sec-${sectionId}`;
            section.innerHTML = `
                <div class="sector-header" onclick="toggleSector('${sectionId}')">
                    <span class="sector-title">${sectorName} (${count})</span>
                    <span style="color:var(--text-muted); font-size:0.6rem;">▼</span>
                </div>
                <div class="grid" id="grid-${sectionId}"></div>
            `;
            content.appendChild(section);
        }
    }

    async function loadStocks() {
        for (const [sectorName, stocks] of Object.entries(sectors)) {
            const sectionId = sectorName.replace(/[^a-zA-Z]/g, '');
            const grid = document.getElementById(`grid-${sectionId}`);
            const isCrypto = sectorName === "Criptomoedas";

            for (const ticker in stocks) {
                try {
                    // Endpoint diferenciado para Cripto vs Ações
                    const url = isCrypto 
                        ? `https://brapi.dev/api/v2/crypto?coin=${ticker}&currency=BRL&token=${API_TOKEN}`
                        : `https://brapi.dev/api/quote/${ticker}?token=${API_TOKEN}`;
                    
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    // A API retorna estruturas diferentes para Cripto (coins) e Quote (results)
                    const stockData = isCrypto ? data.coins?.[0] : data.results?.[0];
                    
                    if (stockData) {
                        updateCard(stockData, stocks[ticker], grid, isCrypto);
                    }
                } catch (e) { console.error(`Erro no ativo ${ticker}:`, e); }
            }
        }
        updateMarketStatus();
    }

    function updateCard(stock, fullName, grid, isCrypto) {
        let cardId = `card-${isCrypto ? stock.coin : stock.symbol}`;
        let card = document.getElementById(cardId);
        
        // Mapeamento de campos (Cripto usa nomes diferentes na API)
        const symbol = isCrypto ? stock.coin : stock.symbol;
        const price = isCrypto ? stock.regularMarketPrice : stock.regularMarketPrice;
        const changePct = isCrypto ? stock.regularMarketChangePercent : stock.regularMarketChangePercent;
        const changeAbs = isCrypto ? Math.abs(stock.regularMarketChange) : Math.abs(stock.regularMarketChange);
        const openPrice = isCrypto ? stock.regularMarketPrice : (stock.regularMarketOpen || stock.regularMarketPreviousClose);

        const isUp = changePct >= 0;
        const colorClass = isUp ? 'up' : 'down';
        
        const googleLink = isCrypto 
            ? `https://www.google.com/finance/quote/${symbol}-BRL`
            : `https://www.google.com/finance/quote/${symbol}:BVMF`;

        const html = `
            <div style="display:flex; flex-direction:column; align-items:center;">
                <a href="${googleLink}" target="_blank" class="ticker-link">${symbol}</a>
                <span class="name">${fullName}</span>
            </div>
            <div style="display:flex; flex-direction:column; align-items:center;">
                <span class="price">R$ ${price.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                <span class="variation ${colorClass}">${isUp ? '+' : ''}${changePct.toFixed(2)}% | R$ ${changeAbs.toFixed(2)}</span>
            </div>
            <div class="info-footer">
                <span class="info-label">${isCrypto ? 'Últimas 24h' : 'Abertura'}</span>
                <span class="info-value">R$ ${openPrice.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
            </div>
        `;

        if (!card) {
            card = document.createElement('div');
            card.id = cardId;
            card.className = 'card';
            grid.appendChild(card);
        }
        card.innerHTML = html;
    }

    function updateMarketStatus() {
        const now = new Date();
        const day = now.getDay();
        const hour = now.getHours();
        const isOpen = (day >= 1 && day <= 5) && (hour >= 10 && hour < 18);

        document.getElementById('marketStatus').innerHTML = `
            <div class="dot ${isOpen ? 'dot-green' : 'dot-red'}"></div>
            MERCADO B3 ${isOpen ? 'ABERTO' : 'FECHADO'} | CRIPTO 24/7 | ${now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
        `;
    }

    function toggleSector(id) { document.getElementById(`sec-${id}`).classList.toggle('collapsed'); }
    function toggleAll(hide) { document.querySelectorAll('.sector-section').forEach(s => hide ? s.classList.add('collapsed') : s.classList.remove('collapsed')); }

    createStructure();
    loadStocks();
    setInterval(loadStocks, 60000);
</script>
</body>
</html>
