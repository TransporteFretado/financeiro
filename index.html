<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor B3 | GTB Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: #161b2b;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --border: #2d3748;
            --accent: #3b82f6;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 10px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Cabeçalho */
        .header { text-align: center; margin-bottom: 20px; width: 100%; }
        .header h1 { font-size: 1.8rem; font-weight: 800; margin: 0; color: var(--accent); }
        .header p { font-size: 0.75rem; color: var(--text-muted); margin-top: 5px; line-height: 1.4; padding: 0 10px; }

        /* Controles Globais */
        .global-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-toggle {
            background: var(--border);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Grupos / Setores */
        .sector-section {
            width: 100%;
            max-width: 800px;
            margin-bottom: 10px;
            border-radius: 12px;
            overflow: hidden;
            background: var(--card-bg);
            border: 1px solid var(--border);
        }

        .sector-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background: #1e2538;
            transition: background 0.3s;
        }

        .sector-header:hover { background: #252d45; }

        .sector-title {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
        }

        .icon-arrow {
            font-size: 0.8rem;
            transition: transform 0.3s;
        }

        .collapsed .icon-arrow { transform: rotate(-90deg); }
        .collapsed .grid { display: none; }

        /* Grid de Cards - Versão Compacta */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
            padding: 15px;
            background: var(--bg);
        }

        /* Card SLIM para Celular */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .ticker-highlight { 
            font-size: 1.1rem; 
            font-weight: 800; 
            color: var(--accent); 
            display: block;
        }
        
        .company-sub { 
            font-size: 0.65rem; 
            color: var(--text-muted); 
            display: block;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .price-main {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 2px 0;
            display: block;
        }

        .variation-sub {
            font-size: 0.75rem;
            font-weight: 600;
        }

        .details {
            margin-top: 8px;
            font-size: 0.6rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            padding-top: 6px;
        }

        .up { color: var(--success); }
        .down { color: var(--danger); }

        /* Rodapé fixo mais fino */
        .footer-status {
            position: fixed;
            bottom: 10px;
            padding: 6px 15px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 20px;
            font-size: 0.65rem;
            border: 1px solid var(--border);
        }

        /* Ajuste para telas muito pequenas */
        @media (max-width: 400px) {
            .grid { grid-template-columns: 1fr 1fr; } /* Dois por linha no celular */
        }
    </style>
</head>
<body>

<div class="header">
    <h1>GTB Solution</h1>
    <p>Carteira de Investimento de Gabriel Naor, Thiago Viegas, Brener Gomes</p>
</div>

<div class="global-controls">
    <button class="btn-toggle" onclick="toggleAll(false)">Expandir Todos</button>
    <button class="btn-toggle" onclick="toggleAll(true)">Recolher Todos</button>
</div>

<div id="dashboard-content" style="width: 100%; max-width: 800px;"></div>

<div class="footer-status" id="marketStatus">SINCRONIZANDO...</div>

<script>
    const API_TOKEN = 'nctccHqqPkRvTdxGsZeK2f';
    
    const sectors = {
        "Bancos & Seguros": {
            "BBAS3": "Banco do Brasil",
            "BBDC4": "Bradesco",
            "BBSE3": "BB Seguridade",
            "CXSE3": "Caixa Seguridade",
            "ITUB4": "Itaú Unibanco"
        },
        "Energia": {
            "EQTL3": "Equatorial Energia",
            "TAEE11": "Taesa"
        },
        "Papel & Indústria": {
            "KLBN3": "Klabin Ord.",
            "KLBN11": "Klabin Unit",
            "UNIP6": "Unipar",
            "WEGE3": "WEG S.A."
        },
        "Fundos Imobiliários": {
            "BTHF11": "BTG Logística",
            "MXRF11": "Maxi Renda"
        }
    };

    function createStructure() {
        const content = document.getElementById('dashboard-content');
        content.innerHTML = '';
        
        for (const [sectorName, stocks] of Object.entries(sectors)) {
            const sectionId = sectorName.replace(/\s+/g, '');
            const section = document.createElement('div');
            section.className = 'sector-section';
            section.id = `sec-${sectionId}`;
            section.innerHTML = `
                <div class="sector-header" onclick="toggleSector('${sectionId}')">
                    <span class="sector-title">${sectorName}</span>
                    <span class="icon-arrow">▼</span>
                </div>
                <div class="grid" id="grid-${sectionId}"></div>
            `;
            content.appendChild(section);
        }
    }

    function toggleSector(id) {
        document.getElementById(`sec-${id}`).classList.toggle('collapsed');
    }

    function toggleAll(hide) {
        const sections = document.querySelectorAll('.sector-section');
        sections.forEach(s => {
            if (hide) s.classList.add('collapsed');
            else s.classList.remove('collapsed');
        });
    }

    async function loadStocks() {
        for (const [sectorName, stocks] of Object.entries(sectors)) {
            const gridId = `grid-${sectorName.replace(/\s+/g, '')}`;
            const grid = document.getElementById(gridId);

            for (const ticker in stocks) {
                try {
                    const response = await fetch(`https://brapi.dev/api/quote/${ticker}?token=${API_TOKEN}`);
                    const data = await response.json();
                    if (data.results && data.results[0]) {
                        updateCard(data.results[0], stocks[ticker], grid);
                    }
                } catch (e) { console.error(ticker, e); }
            }
        }
        document.getElementById('marketStatus').innerText = "ATUALIZADO: " + new Date().toLocaleTimeString();
    }

    function updateCard(stock, fullName, grid) {
        let card = document.getElementById(`card-${stock.symbol}`);
        const isUp = stock.regularMarketChangePercent >= 0;
        const colorClass = isUp ? 'up' : 'down';
        const sign = isUp ? '+' : '';

        const cardHTML = `
            <span class="ticker-highlight">${stock.symbol}</span>
            <span class="company-sub">${fullName}</span>
            <span class="price-main ${colorClass}">R$ ${stock.regularMarketPrice.toFixed(2)}</span>
            <div class="variation-sub ${colorClass}">
                ${sign}${stock.regularMarketChangePercent.toFixed(2)}%
            </div>
            <div class="details">
                Abert: R$ ${stock.regularMarketOpen.toFixed(2)}
            </div>
        `;

        if (card) {
            card.innerHTML = cardHTML;
        } else {
            const newCard = document.createElement('div');
            newCard.id = `card-${stock.symbol}`;
            newCard.className = 'card';
            newCard.innerHTML = cardHTML;
            grid.appendChild(newCard);
        }
    }

    createStructure();
    loadStocks();
    setInterval(loadStocks, 60000);
</script>
</body>
</html>
