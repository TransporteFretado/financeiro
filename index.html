<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GTB Terminal | Estratégico</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e11; --card-bg: #161a1e; --text-main: #e3e6e8;
            --text-muted: #707a8a; --border: #2b3139; --success: #00f2a1; --danger: #ff4d6d; --warning: #ffb800;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text-main); padding-bottom: 60px; }

        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px 10px; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 1.6rem; font-weight: 900; }
        .header p { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; margin-top: 5px; }

        .btn-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; }
        .btn {
            background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border);
            padding: 10px 15px; border-radius: 8px; font-size: 0.65rem; font-weight: 800; cursor: pointer;
        }

        /* Setores */
        .sector-section { margin-bottom: 15px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .sector-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: rgba(255,255,255,0.03); }
        .sector-title { font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; padding: 12px; background: var(--bg); display: none; }
        .expanded .grid { display: grid; }

        /* Card Ações B3 */
        .card { 
            background: var(--card-bg); padding: 20px 15px; border-radius: 10px;
            display: flex; flex-direction: column; align-items: center; position: relative; 
            border: 1px solid var(--border); text-align: center;
        }
        .card.opportunity { border: 1.5px solid var(--success); box-shadow: 0 0 10px rgba(0, 242, 161, 0.1); }

        .buy-label { font-size: 0.5rem; font-weight: 800; color: var(--success); margin-bottom: 6px; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        .ticker-link { font-size: 1.2rem; font-weight: 800; color: #3b82f6; text-decoration: none; }
        .asset-name { font-size: 0.55rem; color: var(--text-muted); margin-bottom: 10px; }
        .price { font-size: 1.6rem; font-weight: 800; margin: 5px 0; letter-spacing: -0.5px; }
        
        .var-box { font-size: 0.8rem; font-weight: 700; padding: 4px 10px; border-radius: 4px; }
        .up { color: var(--success); background: rgba(0, 242, 161, 0.1); }
        .down { color: var(--danger); background: rgba(255, 77, 109, 0.1); }

        /* Widget Cripto (TradingView) */
        .crypto-widget-container { width: 100%; height: 160px; border-radius: 8px; overflow: hidden; background: #131722; }

        .info-footer { margin-top: 15px; padding-top: 10px; border-top: 1px solid var(--border); width: 100%; }
        .info-label { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; }
        .info-value { font-size: 0.9rem; font-weight: 700; color: var(--warning); }

        /* Status Fixado no Rodapé */
        .market-footer {
            position: fixed; bottom: 0; left: 0; right: 0; height: 50px;
            background: #1a1e23; border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            z-index: 2000; font-size: 0.7rem; font-weight: 800;
        }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-open { background-color: var(--success); box-shadow: 0 0 8px var(--success); }
        .dot-closed { background-color: var(--danger); box-shadow: 0 0 8px var(--danger); }

        /* Mobile Responsividade */
        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px; }
            .card { padding: 15px 5px; }
            .ticker-link { font-size: 1rem; }
            .price { font-size: 1.2rem; }
            .var-box { font-size: 0.7rem; }
            .crypto-widget-container { height: 140px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>GTB TERMINAL</h1>
        <p>Dashboard Estratégico 📈</p>
    </div>

    <div class="btn-container">
        <button class="btn" onclick="toggleAll(true)">EXPANDIR TUDO</button>
        <button class="btn" onclick="toggleAll(false)">RECOLHER TUDO</button>
    </div>

    <div id="dashboard-content"></div>
</div>

<div class="market-footer" id="marketFooter">
    <div class="status-dot" id="dot"></div>
    <span id="statusText">CARREGANDO MERCADO...</span>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
    const API_TOKEN = 'nctccHqqPkRvTdxGsZeK2f';
    const config = { "BBAS3": 30.00, "ITUB4": 45.00, "KLBN11": 22.00, "MXRF11": 10.50 };

    const sectors = {
        "Criptomoedas": ["BTCBRL", "ETHBRL", "SOLBRL", "BNBBRL"],
        "Bancos & Seguros": { "BBAS3": "Banco do Brasil", "BBDC4": "Bradesco", "ITUB4": "Itaú", "CXSE3": "Caixa", "BBSE3": "BB Seguridade" },
        "FIIs": { "MXRF11": "Maxi Renda", "HGLG11": "CSHG Logística", "XPLG11": "XP Log" },
        "Papel & Indústria": { "KLBN11": "Klabin", "WEGE3": "WEG S.A" }
    };

    function updateMarketStatus() {
        const now = new Date();
        const day = now.getDay();
        const hour = now.getHours();
        const isOpen = (day >= 1 && day <= 5) && (hour >= 10 && hour < 18);
        
        document.getElementById('dot').className = `status-dot ${isOpen ? 'dot-open' : 'dot-closed'}`;
        document.getElementById('statusText').innerText = `MERCADO B3 ${isOpen ? 'ABERTO' : 'FECHADO'} - ${now.toLocaleTimeString('pt-BR')}`;
    }

    function createStructure() {
        const container = document.getElementById('dashboard-content');
        for (const [name, list] of Object.entries(sectors)) {
            const id = name.replace(/[^a-zA-Z]/g, '');
            const count = Array.isArray(list) ? list.length : Object.keys(list).length;
            container.innerHTML += `
                <div class="sector-section" id="sec-${id}">
                    <div class="sector-header" onclick="toggleSector('${id}')">
                        <span class="sector-title">${name} (${count})</span>
                        <span>▼</span>
                    </div>
                    <div class="grid" id="grid-${id}"></div>
                </div>`;
        }
    }

    async function loadAssets() {
        for (const [sector, list] of Object.entries(sectors)) {
            const gridId = sector.replace(/[^a-zA-Z]/g, '');
            const grid = document.getElementById(`grid-${gridId}`);
            
            if (sector === "Criptomoedas") {
                list.forEach(ticker => {
                    const divId = `tv_${ticker}`;
                    grid.innerHTML += `<div class="card"><div id="${divId}" class="crypto-widget-container"></div></div>`;
                    
                    setTimeout(() => {
                        new TradingView.MediumWidget({
                            "symbols": [[`BINANCE:${ticker}|1D`]],
                            "chartOnly": false, "width": "100%", "height": "100%",
                            "locale": "br", "colorTheme": "dark", "gridLineColor": "rgba(42, 46, 57, 0)",
                            "fontColor": "#787b86", "isTransparent": true, "autosize": true,
                            "container_id": divId
                        });
                    }, 100);
                });
            } else {
                for (const ticker in list) {
                    try {
                        const res = await fetch(`https://brapi.dev/api/quote/${ticker}?token=${API_TOKEN}`);
                        const data = await res.json();
                        const asset = data.results[0];
                        if (asset) {
                            const teto = config[ticker] || 0;
                            const isOpp = teto > 0 && asset.regularMarketPrice <= teto;
                            const isUp = asset.regularMarketChangePercent >= 0;
                            grid.innerHTML += `
                                <div class="card ${isOpp ? 'opportunity' : ''}">
                                    ${isOpp ? '<span class="buy-label">OPORTUNIDADE DE COMPRA</span>' : ''}
                                    <a href="https://www.google.com/finance/quote/${ticker}:BVMF" target="_blank" class="ticker-link">${ticker}</a>
                                    <span class="asset-name">${list[ticker]}</span>
                                    <span class="price">R$ ${asset.regularMarketPrice.toLocaleString('pt-BR', {minimumFractionDigits:2})}</span>
                                    <span class="var-box ${isUp?'up':'down'}">
                                        ${isUp?'+':''}${asset.regularMarketChangePercent.toFixed(2)}% | R$ ${Math.abs(asset.regularMarketChange).toFixed(2)}
                                    </span>
                                    <div class="info-footer">
                                        <span class="info-label">Preço Teto</span>
                                        <span class="info-value">R$ ${teto > 0 ? teto.toFixed(2) : '---'}</span>
                                    </div>
                                </div>`;
                        }
                    } catch (e) {}
                }
            }
        }
    }

    function toggleSector(id) { document.getElementById(`sec-${id}`).classList.toggle('expanded'); }
    function toggleAll(expand) { document.querySelectorAll('.sector-section').forEach(s => expand ? s.classList.add('expanded') : s.classList.remove('expanded')); }

    createStructure();
    loadAssets();
    setInterval(updateMarketStatus, 1000);
    updateMarketStatus();
</script>
</body>
</html>
