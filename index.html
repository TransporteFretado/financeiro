<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor B3 | GTB Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Paleta Neutra Executiva */
            --bg: #0f121a;
            --card-bg: #1a1e29;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            /* Cores de sinalização neutras (menos saturadas) */
            --success: #82bda6; 
            --danger: #c58d8d;
            --border: #2d3548;
            --accent: #94a3b8; /* Cinza azulado neutro para títulos */
        }

        .light-theme {
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --accent: #475569;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Sora', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px 10px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.5s ease;
        }

        /* --- CABEÇALHO --- */
        .header { text-align: center; margin-bottom: 30px; width: 100%; }
        .header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.05em; margin: 0; color: var(--text-main); text-transform: uppercase; }
        .header p { font-size: 0.8rem; color: var(--text-muted); margin-top: 8px; font-weight: 300; }

        .global-controls { display: flex; gap: 12px; margin-bottom: 25px; }
        .btn-toggle {
            background: transparent; color: var(--text-muted); border: 1px solid var(--border);
            padding: 8px 18px; border-radius: 4px; font-size: 0.6rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .btn-toggle:hover { border-color: var(--text-muted); color: var(--text-main); }

        /* --- SEÇÕES --- */
        .sector-section {
            width: 100%; max-width: 900px; margin-bottom: 15px;
            border-radius: 4px; overflow: hidden; background: var(--card-bg); border: 1px solid var(--border);
        }

        .sector-header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; background: rgba(255, 255, 255, 0.01);
        }

        .sector-title { font-size: 0.7rem; font-weight: 700; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1px; background: var(--border); border-top: 1px solid var(--border); }
        .collapsed .grid { display: none; }

        /* --- CARDS NEUTROS --- */
        .card { background: var(--card-bg); padding: 25px 15px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .ticker-name { font-size: 0.95rem; font-weight: 700; margin-bottom: 2px; letter-spacing: 0.02em; }
        .company-name { font-size: 0.55rem; color: var(--text-muted); margin-bottom: 15px; text-transform: uppercase; }
        .price-main { font-size: 1.6rem; font-weight: 400; margin-bottom: 6px; color: var(--text-main); }
        
        .variation-box { font-size: 0.7rem; font-weight: 600; margin-bottom: 22px; padding: 2px 8px; border-radius: 2px; }
        
        /* Abertura Central Inferior */
        .opening-label { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .opening-price { font-size: 0.8rem; font-weight: 400; color: var(--text-muted); }

        .up { color: var(--success); }
        .down { color: var(--danger); }

        /* --- STATUS RODAPÉ --- */
        .footer-status {
            position: fixed; bottom: 20px; padding: 10px 20px; background: var(--card-bg);
            border-radius: 4px; font-size: 0.65rem; font-weight: 400; border: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px; color: var(--text-muted);
        }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; }
        .dot-green { background: var(--success); }
        .dot-red { background: var(--danger); }
        
        @media (max-width: 480px) { .grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <h1>GTB Solution</h1>
    <p>Carteira de Investimento</p>
</div>

<div class="global-controls">
    <button class="btn-toggle" onclick="toggleAll(false)">Expandir</button>
    <button class="btn-toggle" onclick="toggleAll(true)">Recolher</button>
</div>

<div id="dashboard-content" style="width: 100%; max-width: 900px; padding-bottom: 80px;"></div>

<div class="footer-status" id="marketStatus"></div>

<script>
    const API_TOKEN = 'nctccHqqPkRvTdxGsZeK2f';
    
    const sectors = {
        "Bancos & Seguros": { "BBAS3": "Banco do Brasil", "BBDC4": "Bradesco", "BBSE3": "BB Seguridade", "CXSE3": "Caixa Seguridade", "ITUB4": "Itaú Unibanco" },
        "Energia": { "EQTL3": "Equatorial Energia", "TAEE11": "Taesa" },
        "Papel & Indústria": { "KLBN3": "Klabin Ord.", "KLBN11": "Klabin Unit", "UNIP6": "Unipar", "WEGE3": "WEG S.A." },
        "Fundos Imobiliários": { "BTHF11": "BTG Logística", "MXRF11": "Maxi Renda" }
    };

    function applyAutoTheme() {
        const hour = new Date().getHours();
        if (hour >= 6 && hour < 18) document.body.classList.add('light-theme');
    }

    function createStructure() {
        const content = document.getElementById('dashboard-content');
        content.innerHTML = '';
        for (const [sectorName, stocks] of Object.entries(sectors)) {
            const sectionId = sectorName.replace(/\s+/g, '');
            const section = document.createElement('div');
            section.className = 'sector-section';
            section.id = `sec-${sectionId}`;
            section.innerHTML = `
                <div class="sector-header" onclick="toggleSector('${sectionId}')">
                    <span class="sector-title">${sectorName}</span>
                    <span style="font-size: 0.5rem; color: var(--text-muted);">▼</span>
                </div>
                <div class="grid" id="grid-${sectionId}"></div>
            `;
            content.appendChild(section);
        }
    }

    async function loadStocks() {
        for (const [sectorName, stocks] of Object.entries(sectors)) {
            const gridId = `grid-${sectorName.replace(/\s+/g, '')}`;
            const grid = document.getElementById(gridId);
            for (const ticker in stocks) {
                try {
                    const response = await fetch(`https://brapi.dev/api/quote/${ticker}?token=${API_TOKEN}`);
                    const data = await response.json();
                    if (data.results && data.results[0]) {
                        updateCard(data.results[0], stocks[ticker], grid);
                    }
                } catch (e) { console.error(ticker, e); }
            }
        }
        updateMarketStatus();
    }

    function updateCard(stock, fullName, grid) {
        let card = document.getElementById(`card-${stock.symbol}`);
        const isUp = stock.regularMarketChangePercent >= 0;
        const colorClass = isUp ? 'up' : 'down';
        const sign = isUp ? '+' : '';

        const cardHTML = `
            <span class="ticker-name">${stock.symbol}</span>
            <span class="company-name">${fullName}</span>
            <span class="price-main">R$ ${stock.regularMarketPrice.toFixed(2)}</span>
            <div class="variation-box ${colorClass}">
                ${sign}${stock.regularMarketChangePercent.toFixed(2)}% | R$ ${Math.abs(stock.regularMarketChange).toFixed(2)}
            </div>
            <span class="opening-label">Abertura</span>
            <span class="opening-price">R$ ${stock.regularMarketOpen.toFixed(2)}</span>
        `;

        if (card) {
            card.innerHTML = cardHTML;
        } else {
            const newCard = document.createElement('div');
            newCard.id = `card-${stock.symbol}`;
            newCard.className = 'card';
            newCard.innerHTML = cardHTML;
            grid.appendChild(newCard);
        }
    }

    function updateMarketStatus() {
        const now = new Date();
        const isOpen = now.getHours() >= 10 && now.getHours() < 18;
        const statusEl = document.getElementById('marketStatus');
        statusEl.innerHTML = `
            <div class="status-dot ${isOpen?'dot-green':'dot-red'}"></div>
            <span style="text-transform: uppercase; letter-spacing: 0.1em;">Mercado ${isOpen?'Aberto':'Fechado'}</span>
        `;
    }

    function toggleSector(id) { document.getElementById(`sec-${id}`).classList.toggle('collapsed'); }
    function toggleAll(hide) {
        document.querySelectorAll('.sector-section').forEach(s => {
            hide ? s.classList.add('collapsed') : s.classList.remove('collapsed');
        });
    }

    applyAutoTheme();
    createStructure();
    loadStocks();
    setInterval(loadStocks, 60000);
</script>
</body>
</html>
