<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GTB Terminal | Estratégico</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e11; --card-bg: #161a1e; --text-main: #e3e6e8;
            --text-muted: #707a8a; --border: #2b3139; --success: #00f2a1; --danger: #ff4d6d; --warning: #ffb800;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text-main); padding-bottom: 70px; }

        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px 10px; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 1.6rem; font-weight: 900; color: #fff; }

        .btn-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; }
        .btn {
            background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border);
            padding: 10px 18px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; cursor: pointer;
        }

        /* Setores */
        .sector-section { margin-bottom: 15px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .sector-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: rgba(255,255,255,0.03); }
        .sector-title { font-size: 0.8rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }

        /* Grid Ajustado */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; padding: 15px; background: var(--bg); display: none; }
        .expanded .grid { display: grid; }

        /* Card Base */
        .card { 
            background: var(--card-bg); padding: 20px; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; position: relative; 
            border: 1px solid var(--border); text-align: center;
        }
        
        /* Card Cripto - Maior Largura/Altura */
        .card-crypto { min-height: 220px; padding: 10px; }

        .ticker-link { font-size: 1.3rem; font-weight: 800; color: #3b82f6; text-decoration: none; display: block; margin-bottom: 2px; }
        .asset-name { font-size: 0.65rem; color: var(--text-muted); font-weight: 600; margin-bottom: 12px; }
        
        /* Widgets e Preços */
        .crypto-widget-container { width: 100%; height: 180px; border-radius: 8px; overflow: hidden; }

        /* Estilo Ações B3 */
        .card.opportunity { border: 1.5px solid var(--success); }
        .price { font-size: 1.6rem; font-weight: 800; margin: 5px 0; }
        .var-box { font-size: 0.85rem; font-weight: 700; padding: 4px 10px; border-radius: 4px; }
        .up { color: var(--success); background: rgba(0, 242, 161, 0.1); }
        .down { color: var(--danger); background: rgba(255, 77, 109, 0.1); }

        /* Footer Status */
        .market-footer {
            position: fixed; bottom: 0; left: 0; right: 0; height: 55px;
            background: #161a1e; border-top: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center; gap: 12px;
            z-index: 9999; font-size: 0.75rem; font-weight: 800; box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
        }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-open { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .dot-closed { background: var(--danger); box-shadow: 0 0 10px var(--danger); }

        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr; } /* No mobile, 1 por linha para o gráfico aparecer bem */
            .card-crypto { min-height: 200px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>GTB TERMINAL</h1>
    </div>

    <div class="btn-container">
        <button class="btn" onclick="toggleAll(true)">EXPANDIR TUDO</button>
        <button class="btn" onclick="toggleAll(false)">RECOLHER TUDO</button>
    </div>

    <div id="dashboard-content"></div>
</div>

<div class="market-footer" id="marketFooter">
    <div class="status-dot" id="dot"></div>
    <span id="statusText">SINCRONIZANDO MERCADO...</span>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
    const API_TOKEN = 'nctccHqqPkRvTdxGsZeK2f';
    const config = { "BBAS3": 30.00, "ITUB4": 45.00, "KLBN11": 22.00, "MXRF11": 10.50 };

    const sectors = {
        "Criptomoedas": { "BTCBRL": "Bitcoin", "ETHBRL": "Ethereum", "SOLBRL": "Solana", "BNBBRL": "Binance Coin" },
        "Bancos & Seguros": { "BBAS3": "Banco do Brasil", "BBDC4": "Bradesco", "ITUB4": "Itaú", "CXSE3": "Caixa", "BBSE3": "BB Seguridade" },
        "FIIs": { "MXRF11": "Maxi Renda", "HGLG11": "CSHG Logística", "XPLG11": "XP Log" }
    };

    function updateClock() {
        const now = new Date();
        const day = now.getDay();
        const hour = now.getHours();
        const isOpen = (day >= 1 && day <= 5) && (hour >= 10 && hour < 18);
        document.getElementById('dot').className = `status-dot ${isOpen ? 'dot-open' : 'dot-closed'}`;
        document.getElementById('statusText').innerText = `MERCADO B3 ${isOpen ? 'ABERTO' : 'FECHADO'} - ${now.toLocaleTimeString('pt-BR')}`;
    }

    function createStructure() {
        const container = document.getElementById('dashboard-content');
        for (const [name, list] of Object.entries(sectors)) {
            const id = name.replace(/[^a-zA-Z]/g, '');
            container.innerHTML += `
                <div class="sector-section" id="sec-${id}">
                    <div class="sector-header" onclick="toggleSector('${id}')">
                        <span class="sector-title">${name}</span>
                        <span>▼</span>
                    </div>
                    <div class="grid" id="grid-${id}"></div>
                </div>`;
        }
    }

    async function loadAssets() {
        for (const [sector, list] of Object.entries(sectors)) {
            const gridId = sector.replace(/[^a-zA-Z]/g, '');
            const grid = document.getElementById(`grid-${gridId}`);
            
            if (sector === "Criptomoedas") {
                for (const ticker in list) {
                    const divId = `tv_${ticker}`;
                    grid.innerHTML += `
                        <div class="card card-crypto">
                            <a href="https://www.google.com/finance/quote/${ticker.replace('BRL','')}-BRL" target="_blank" class="ticker-link">${ticker}</a>
                            <span class="asset-name">${list[ticker]}</span>
                            <div id="${divId}" class="crypto-widget-container"></div>
                        </div>`;
                    
                    setTimeout(() => {
                        new TradingView.MediumWidget({
                            "symbols": [[`BINANCE:${ticker}|1D`]],
                            "chartOnly": false, "width": "100%", "height": "100%",
                            "locale": "br", "colorTheme": "dark", "gridLineColor": "rgba(42, 46, 57, 0)",
                            "fontColor": "#787b86", "isTransparent": true, "autosize": true,
                            "container_id": divId,
                            "showFloatingTooltip": true,
                            "scalePosition": "no", "scaleMode": "Normal",
                            "fontFamily": "Sora, sans-serif"
                        });
                    }, 200);
                }
            } else {
                for (const ticker in list) {
                    try {
                        const res = await fetch(`https://brapi.dev/api/quote/${ticker}?token=${API_TOKEN}`);
                        const data = await res.json();
                        const asset = data.results[0];
                        const teto = config[ticker] || 0;
                        const isOpp = teto > 0 && asset.regularMarketPrice <= teto;
                        const isUp = asset.regularMarketChangePercent >= 0;

                        grid.innerHTML += `
                            <div class="card ${isOpp ? 'opportunity' : ''}">
                                <a href="#" class="ticker-link">${ticker}</a>
                                <span class="asset-name">${list[ticker]}</span>
                                <span class="price">R$ ${asset.regularMarketPrice.toLocaleString('pt-BR', {minimumFractionDigits:2})}</span>
                                <span class="var-box ${isUp?'up':'down'}">
                                    ${isUp?'+':''}${asset.regularMarketChangePercent.toFixed(2)}%
                                </span>
                                <div class="info-footer">
                                    <span class="info-label">TETO:</span> <span class="info-value">R$ ${teto > 0 ? teto.toFixed(2) : '---'}</span>
                                </div>
                            </div>`;
                    } catch (e) {}
                }
            }
        }
    }

    function toggleSector(id) { document.getElementById(`sec-${id}`).classList.toggle('expanded'); }
    function toggleAll(expand) { document.querySelectorAll('.sector-section').forEach(s => expand ? s.classList.add('expanded') : s.classList.remove('expanded')); }

    createStructure();
    loadAssets();
    setInterval(updateClock, 1000);
    updateClock();
</script>
</body>
</html>
