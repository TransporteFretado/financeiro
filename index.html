<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor B3 | GTB Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050b1a;
            --card-bg: #0d1626;
            --b3-blue: #003399; 
            --b3-bright: #0055ff;
            --success: #00ff88;
            --danger: #ff3355;
            --text-main: #ffffff;
            --text-muted: #8a99af;
            --border: #1e2d45;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Sora', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.5rem; color: var(--b3-bright); letter-spacing: 1px; text-transform: uppercase; }
        .header p { font-size: 0.8rem; color: var(--text-muted); margin-top: 5px; }

        .btn-container { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn {
            background: var(--b3-blue); color: white; border: none;
            padding: 10px 15px; border-radius: 6px; font-size: 0.65rem;
            font-weight: 700; cursor: pointer; text-transform: uppercase;
        }

        .sector-section {
            width: 100%; max-width: 900px; margin-bottom: 20px;
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 10px; overflow: hidden;
        }

        .sector-header {
            padding: 15px 20px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; background: rgba(0, 51, 153, 0.1);
            border-bottom: 1px solid var(--border);
        }

        .sector-title { font-size: 0.75rem; font-weight: 800; color: var(--b3-bright); text-transform: uppercase; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 1px; 
            background: var(--border); 
        }
        
        .collapsed .grid { display: none; }

        .card { 
            background: var(--card-bg); 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: space-between;
            min-height: 200px;
        }

        .ticker { font-size: 1.1rem; font-weight: 800; color: var(--b3-bright); margin-bottom: 2px; }
        .name { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; text-align: center; height: 1.2rem; overflow: hidden; }
        
        .price { font-size: 1.8rem; font-weight: 700; margin-bottom: 4px; }
        
        .variation { font-size: 0.85rem; font-weight: 700; padding: 2px 0; border-radius: 4px; }
        .up { color: var(--success); text-shadow: 0 0 8px rgba(0, 255, 136, 0.2); }
        .down { color: var(--danger); text-shadow: 0 0 8px rgba(255, 51, 85, 0.2); }

        .info-footer { 
            margin-top: 15px; 
            padding-top: 12px; 
            border-top: 1px solid rgba(255,255,255,0.05); 
            width: 100%; 
            text-align: center; 
        }
        .info-label { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 2px; }
        .info-value { font-size: 0.9rem; font-weight: 600; color: var(--text-main); }

        .footer-status {
            position: fixed; bottom: 20px; padding: 10px 20px;
            background: #000; border-radius: 50px; border: 1px solid var(--b3-blue);
            font-size: 0.65rem; font-weight: 700; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-green { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .dot-red { background: var(--danger); box-shadow: 0 0 10px var(--danger); }

        @media (max-width: 480px) { .grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <h1>GTB Solution</h1>
    <p>Carteira de Investimento</p>
</div>

<div class="btn-container">
    <button class="btn" onclick="toggleAll(false)">Expandir Todos</button>
    <button class="btn" onclick="toggleAll(true)">Recolher Todos</button>
</div>

<div id="dashboard-content" style="width: 100%; max-width: 900px; padding-bottom: 100px;"></div>

<div class="footer-status" id="marketStatus"></div>

<script>
    const API_TOKEN = 'nctccHqqPkRvTdxGsZeK2f';
    const sectors = {
        "Bancos & Seguros": { "BBAS3": "Banco do Brasil", "BBDC4": "Bradesco", "BBSE3": "BB Seguridade", "CXSE3": "Caixa Seguridade", "ITUB4": "Itaú Unibanco" },
        "Energia": { "EQTL3": "Equatorial Energia", "TAEE11": "Taesa" },
        "Papel & Indústria": { "KLBN3": "Klabin Ord.", "KLBN11": "Klabin Unit", "UNIP6": "Unipar", "WEGE3": "WEG S.A." },
        "Fundos Imobiliários": { "BTHF11": "BTG Logística", "MXRF11": "Maxi Renda" }
    };

    function createStructure() {
        const content = document.getElementById('dashboard-content');
        content.innerHTML = '';
        for (const [sectorName, stocks] of Object.entries(sectors)) {
            const count = Object.keys(stocks).length;
            const sectionId = sectorName.replace(/\s+/g, '');
            const section = document.createElement('div');
            section.className = 'sector-section';
            section.id = `sec-${sectionId}`;
            section.innerHTML = `
                <div class="sector-header" onclick="toggleSector('${sectionId}')">
                    <span class="sector-title">${sectorName} (${count})</span>
                    <span style="color:var(--b3-bright); font-size:0.7rem;">▼</span>
                </div>
                <div class="grid" id="grid-${sectionId}"></div>
            `;
            content.appendChild(section);
        }
    }

    async function loadStocks() {
        for (const [sectorName, stocks] of Object.entries(sectors)) {
            const grid = document.getElementById(`grid-${sectorName.replace(/\s+/g, '')}`);
            for (const ticker in stocks) {
                try {
                    const response = await fetch(`https://brapi.dev/api/quote/${ticker}?token=${API_TOKEN}`);
                    const data = await response.json();
                    if (data.results?.[0]) updateCard(data.results[0], stocks[ticker], grid);
                } catch (e) { console.error(ticker, e); }
            }
        }
        updateMarketStatus();
    }

    function updateCard(stock, fullName, grid) {
        let card = document.getElementById(`card-${stock.symbol}`);
        const isUp = stock.regularMarketChangePercent >= 0;
        const colorClass = isUp ? 'up' : 'down';
        const sign = isUp ? '+' : '';
        const open = stock.regularMarketOpen || stock.regularMarketPreviousClose || 0;
        const changeAbs = Math.abs(stock.regularMarketChange).toFixed(2);

        // Formatação solicitada: -3% | R$ 2,50
        const html = `
            <div style="display:flex; flex-direction:column; align-items:center;">
                <span class="ticker">${stock.symbol}</span>
                <span class="name">${fullName}</span>
            </div>
            <div style="display:flex; flex-direction:column; align-items:center;">
                <span class="price">R$ ${stock.regularMarketPrice.toFixed(2)}</span>
                <span class="variation ${colorClass}">${sign}${stock.regularMarketChangePercent.toFixed(2)}% | R$ ${changeAbs}</span>
            </div>
            <div class="info-footer">
                <span class="info-label">Abertura</span>
                <span class="info-value">R$ ${open.toFixed(2)}</span>
            </div>
        `;

        if (!card) {
            card = document.createElement('div');
            card.id = `card-${stock.symbol}`;
            card.className = 'card';
            grid.appendChild(card);
        }
        card.innerHTML = html;
    }

    function updateMarketStatus() {
        const now = new Date();
        const isOpen = now.getHours() >= 10 && now.getHours() < 18;
        document.getElementById('marketStatus').innerHTML = `
            <div class="dot ${isOpen?'dot-green':'dot-red'}"></div>
            MERCADO ${isOpen?'ABERTO':'FECHADO'} | ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
        `;
    }

    function toggleSector(id) { document.getElementById(`sec-${id}`).classList.toggle('collapsed'); }
    function toggleAll(hide) { document.querySelectorAll('.sector-section').forEach(s => hide ? s.classList.add('collapsed') : s.classList.remove('collapsed')); }

    createStructure();
    loadStocks();
    setInterval(loadStocks, 60000);
</script>
</body>
</html>
