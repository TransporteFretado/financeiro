<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor B3 | GTB Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: #161b2b;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --border: #2d3748;
            --accent: #3b82f6;
        }

        .light-theme {
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #d1d5db;
            --accent: #2563eb;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 10px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.5s ease;
        }

        .header { text-align: center; margin-bottom: 20px; width: 100%; }
        .header h1 { font-size: 1.8rem; font-weight: 800; margin: 0; color: var(--accent); }
        .header p { font-size: 0.75rem; color: var(--text-muted); margin-top: 5px; }

        .global-controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-toggle {
            background: var(--border); color: var(--text-main); border: none;
            padding: 8px 15px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; cursor: pointer;
        }

        .sector-section {
            width: 100%; max-width: 800px; margin-bottom: 10px;
            border-radius: 12px; overflow: hidden; background: var(--card-bg); border: 1px solid var(--border);
        }

        .sector-header {
            padding: 15px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; background: rgba(128, 128, 128, 0.1);
        }

        .sector-title { font-size: 0.85rem; font-weight: 800; color: var(--accent); text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; padding: 15px; }
        .collapsed .grid { display: none; }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
        .ticker-highlight { font-size: 1.1rem; font-weight: 800; color: var(--accent); display: block; }
        .company-sub { font-size: 0.65rem; color: var(--text-muted); display: block; margin-bottom: 8px; }
        .price-main { font-size: 1.6rem; font-weight: 800; margin: 2px 0; display: block; }
        .variation-sub { font-size: 0.75rem; font-weight: 600; margin-bottom: 5px; }
        .details { margin-top: 8px; font-size: 0.6rem; color: var(--text-muted); border-top: 1px solid var(--border); padding-top: 6px; }

        .up { color: var(--success); }
        .down { color: var(--danger); }

        .footer-status {
            position: fixed; bottom: 10px; padding: 10px 20px; background: var(--card-bg);
            border-radius: 30px; font-size: 0.7rem; font-weight: bold; border: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000;
        }

        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-green { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .dot-red { background: var(--danger); }

        @media (max-width: 400px) { .grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <h1>GTB Solution</h1>
    <p>Carteira de Investimento de Gabriel Naor, Thiago Viegas, Brener Gomes</p>
</div>

<div class="global-controls">
    <button class="btn-toggle" onclick="toggleAll(false)">Expandir Todos</button>
    <button class="btn-toggle" onclick="toggleAll(true)">Recolher Todos</button>
</div>

<div id="dashboard-content" style="width: 100%; max-width: 800px; padding-bottom: 60px;"></div>

<div class="footer-status" id="marketStatus"></div>

<script>
    const API_TOKEN = 'nctccHqqPkRvTdxGsZeK2f';
    
    const sectors = {
        "Bancos & Seguros": { "BBAS3": "Banco do Brasil", "BBDC4": "Bradesco", "BBSE3": "BB Seguridade", "CXSE3": "Caixa Seguridade", "ITUB4": "Itaú Unibanco" },
        "Energia": { "EQTL3": "Equatorial Energia", "TAEE11": "Taesa" },
        "Papel & Indústria": { "KLBN3": "Klabin Ord.", "KLBN11": "Klabin Unit", "UNIP6": "Unipar", "WEGE3": "WEG S.A." },
        "Fundos Imobiliários": { "BTHF11": "BTG Logística", "MXRF11": "Maxi Renda" }
    };

    // Mapeamento inverso para acesso rápido
    const tickerToName = {};
    Object.values(sectors).forEach(sector => {
        Object.assign(tickerToName, sector);
    });

    function applyAutoTheme() {
        const hour = new Date().getHours();
        document.body.classList.toggle('light-theme', hour >= 6 && hour < 18);
    }

    function createStructure() {
        const content = document.getElementById('dashboard-content');
        content.innerHTML = '';
        for (const [sectorName, stocks] of Object.entries(sectors)) {
            const sectionId = sectorName.replace(/\s+/g, '');
            const section = document.createElement('div');
            section.className = 'sector-section';
            section.id = `sec-${sectionId}`;
            section.innerHTML = `
                <div class="sector-header" onclick="toggleSector('${sectionId}')">
                    <span class="sector-title">${sectorName} (${Object.keys(stocks).length})</span>
                    <span class="icon-arrow">▼</span>
                </div>
                <div class="grid" id="grid-${sectionId}"></div>
            `;
            content.appendChild(section);
        }
    }

    async function loadStocks() {
        // Criamos uma lista com todos os tickers separados por vírgula
        const allTickers = Object.keys(tickerToName).join(',');
        
        try {
            // Chamada única para TODAS as ações (Batch Quote)
            const response = await fetch(`https://brapi.dev/api/quote/${allTickers}?token=${API_TOKEN}`);
            const data = await response.json();

            if (data.results) {
                data.results.forEach(stock => {
                    const sectorId = getSectorIdByTicker(stock.symbol);
                    const grid = document.getElementById(`grid-${sectorId}`);
                    if (grid) updateCard(stock, tickerToName[stock.symbol], grid);
                });
            }
        } catch (e) {
            console.error("Erro na atualização:", e);
        }
        updateMarketStatus();
    }

    function getSectorIdByTicker(ticker) {
        for (const [sectorName, stocks] of Object.entries(sectors)) {
            if (stocks[ticker]) return sectorName.replace(/\s+/g, '');
        }
        return null;
    }

    function updateCard(stock, fullName, grid) {
        let card = document.getElementById(`card-${stock.symbol}`);
        const isUp = stock.regularMarketChangePercent >= 0;
        const colorClass = isUp ? 'up' : 'down';
        const variationText = `${isUp ? '+' : ''}${stock.regularMarketChangePercent.toFixed(2)}% | R$ ${Math.abs(stock.regularMarketChange || 0).toFixed(2)}`;

        const cardHTML = `
            <span class="ticker-highlight">${stock.symbol}</span>
            <span class="company-sub">${fullName}</span>
            <span class="price-main ${colorClass}">R$ ${stock.regularMarketPrice.toFixed(2)}</span>
            <div class="variation-sub ${colorClass}">${variationText}</div>
            <div class="details">Abert: R$ ${stock.regularMarketOpen?.toFixed(2) || '0.00'}</div>
        `;

        if (card) {
            card.innerHTML = cardHTML;
        } else {
            const newCard = document.createElement('div');
            newCard.id = `card-${stock.symbol}`;
            newCard.className = 'card';
            newCard.innerHTML = cardHTML;
            grid.appendChild(newCard);
        }
    }

    function updateMarketStatus() {
        const now = new Date();
        const isOpen = now.getHours() >= 10 && now.getHours() < 18;
        const statusEl = document.getElementById('marketStatus');
        statusEl.innerHTML = `
            <div class="status-dot ${isOpen ? 'dot-green' : 'dot-red'}"></div>
            <span>${isOpen ? 'Mercado Aberto' : 'Mercado Fechado'} | Atualizado: ${now.toLocaleTimeString()}</span>
        `;
    }

    function toggleSector(id) { document.getElementById(`sec-${id}`).classList.toggle('collapsed'); }
    function toggleAll(hide) {
        document.querySelectorAll('.sector-section').forEach(s => s.classList.toggle('collapsed', hide));
    }

    applyAutoTheme();
    createStructure();
    loadStocks(); 
    
    // Taxa de atualização: 30 segundos (Equilíbrio entre rapidez e consumo de API)
    setInterval(loadStocks, 30000);
</script>
</body>
</html>
